  port: 80
time:
  - platform: homeassistant
    id: ha_time
  - platform: sntp
    id: sntp_time
    timezone: "Australia/Melbourne"
    on_time:
      - seconds: 0
        then:
          - script.execute: update_clock
          - lambda: |-
              bool day = id(sunstate).is_above_horizon();
              if (!day) {
                //set the brightness to screen
                id(matrix_display).set_brightness(15);
                //set the brightness to number value
                auto call = id(led_brightness).make_call();
                call.set_value(15);
                call.perform();
              } else if (day) {
                id(matrix_display).set_brightness(35);
                auto call = id(led_brightness).make_call();
                call.set_value(35);
                call.perform();
              }
        
sun:
  id: sunstate
  latitude: -37.8162°
  longitude: 144.9640°

sensor:
  - platform: sun
    name: Sun Elevation
    type: elevation
    update_interval: 600s
  - platform: sun
    name: Sun Azimuth
    type: azimuth
    update_interval: 600s

  - platform: shtcx
    temperature:
      name: "Study Temperature"
      id: study_temp
      filters:
        - offset: -11

    humidity:
      name: "Study Humidity"
      id: study_humidity
      filters:
        - offset: 15
    update_interval: 20s
    i2c_id: i2c_adc_dac

  - platform: template
    name: "Accel Z"
    id: accel_z
    unit_of_measurement: "g"
    accuracy_decimals: 2
    update_interval: 200ms
    lambda: |-
      uint8_t reg = 0x39;   // Accel Z LSB
      uint8_t data[2];

      if (id(i2c_adc_dac)->write_readv(0x6B, &reg, 1, data, 2) != i2c::ERROR_OK)
        return NAN;

      int16_t raw = (int16_t)((data[1] << 8) | data[0]);

      // ±2g scale
      return raw / 16384.0;

text_sensor:
  - platform: homeassistant
    id: ha_weather_state
    entity_id: weather.berwick

  - platform: wifi_info
    ip_address:
      name: Device IP Address
      id: device_ip
      on_value:
        then:
          - component.update: matrix_display
    ssid:
      id: wifi_ssid
      name: "WiFi SSID"

select:
  - platform: template
    name: "Matrix Display Page"
    id: display_page
    restore_value: True
    options:
      - "Mario"
      - "Minecraft"
      - "Network"
    initial_option: "Mario"
    optimistic: true
    set_action:
      - lambda: |-
          if (x == "Mario") {
            id(page_no) = 1;
            id(matrix_display).show_page(id(mario_page));
            id(mario_anim_state) = 0;
            id(mario_anim_tick)  = 0;
            id(mario_y)          = id(mario_base_y);
          } else if (x == "Minecraft") {
            id(page_no) = 2;
            id(matrix_display).show_page(id(minecraft_page));
          } else if (x == "Network") {
            id(page_no) = 3;
            id(matrix_display).show_page(id(network_page));
          }
      - component.update: matrix_display

  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    icon: "mdi:account-voice"
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - wait_until:
                lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id} || id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
            - if:
                condition:
                  lambda: return x == "In Home Assistant";
                then:
                  - micro_wake_word.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - lambda: id(va).set_use_wake_word(true);
                        - voice_assistant.start_continuous:
            - if:
                condition:
                  lambda: return x == "On device";
                then:
                  - lambda: id(va).set_use_wake_word(false);
                  - voice_assistant.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start
color:
  - id: active_timer_color
    hex: "26ed3a"
  - id: paused_timer_color
    hex: "3b89e3"

