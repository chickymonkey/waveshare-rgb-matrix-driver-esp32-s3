interval:
  - interval: 1400ms
    id: twinkle_stars
    then:
      - lambda: |-
          bool day = id(sunstate).is_above_horizon();
          if (id(screen_laid) || id(screen_faced_down) || id(side_lifted) || id(page_no) != 1 || day) return;

          if (!day) {
            // Night star twinkle
            id(twinkle_index) = (id(twinkle_index) + 1) % 2;
          }
          
          id(matrix_display).update();
  
  - interval: 200ms
    id: mario_animation
    then:
      - lambda: |-
          if (id(page_no) != 1) return;  // only run on Mario page

          id(mario_anim_tick) += 1;

          switch (id(mario_anim_state)) {

            case 0:  // IDLE — wait ~2.5 seconds then start jump: 12 x 200ms
              if (id(mario_anim_tick) >= 12) {
                id(mario_anim_state) = 1;
                id(mario_anim_tick)  = 0;
              }
              break;

            case 1:  // JUMPING UP — 3 pixel
              id(mario_y) = id(mario_base_y) - 3;
              if (id(mario_anim_tick) >= 1) {
                id(mario_anim_state) = 4;   // ← go to delay state, not hit
                id(mario_anim_tick)  = 0;
              }
              break;

            case 4:  // DELAY — mario holds at peak for ~400ms before block moves
              if (id(mario_anim_tick) >= 1) {   // 1 ticks × 400ms = 400ms
                id(mario_anim_state) = 2;
                id(mario_anim_tick)  = 0;
              }
              break;

            case 2:  // HIT — block bumps for ~400ms
              if (id(mario_anim_tick) >= 1) {   // 1 ticks × 400ms = 400ms
                id(mario_anim_state) = 3;
                id(mario_anim_tick)  = 0;
              }
              break;

            case 3:  // FALLING — mario returns to ground
              id(mario_y) = id(mario_base_y);
              if (id(mario_anim_tick) >= 1) {
                id(mario_y)          = id(mario_base_y);
                id(mario_anim_state) = 0;
                id(mario_anim_tick)  = 0;
              }
              break;
          }

          id(matrix_display).update();

  - interval: 410ms
    id: zombie_animation
    then:
      - lambda: |-
          if (id(page_no) != 2) return;   // only run on Minecraft page

          id(zombie_offset) += id(zombie_dir);

          // Clamp and reverse at ends (range: 0 → -4 → 0)
          if (id(zombie_offset) <= -4) {
            id(zombie_offset) = -4;
            id(zombie_dir) = +1;
          } else if (id(zombie_offset) >= 0) {
            id(zombie_offset) = 0;
            id(zombie_dir) = -1;
          }

          id(matrix_display).update();

  - interval: 500ms
    id: rotation_reaction
    then:
      - lambda: |-
          static bool laid = false;
          static bool faced_down = false;
          static bool volume_adjusting = false;
          float x = id(accel_z).state;
          float y = id(accel_y).state;
          int current_page = id(page_no);

          if (isnan(x) || isnan(y)) return;

          // Volume control by Y tilt
          if (y > 0.21) {
            id(side_lifted) = true;
            volume_adjusting = true;
            id(matrix_display).show_page(id(volume_page));
            id(speaker_volume_up).execute();
            id(matrix_display).update();
          } else if (y < -0.21) {
            id(side_lifted) = true;
            volume_adjusting = true;
            id(matrix_display).show_page(id(volume_page));
            id(speaker_volume_down).execute();
            id(matrix_display).update();
          } else if (volume_adjusting && y < 0.07 && y > -0.07) {
            id(side_lifted) = false;
            volume_adjusting = false;

            if (current_page == 1) {
              id(matrix_display).show_page(id(mario_page));
            } else if (current_page == 2) {
              id(matrix_display).show_page(id(minecraft_page));
            } else if (current_page == 3) {
              id(matrix_display).show_page(id(network_page));
            }
          
            id(matrix_display).update();
          }
          
          //Screen is laid facing up.
          //if (isnan(x)) return;
          if (!laid && x < -0.65) {
            id(screen_laid) = true;
            laid = true;
            
            ESP_LOGI("ROTATE", "=== Screen is down ===");
            id(matrix_display).show_page(id(network_page));
            // Turn on backlight
            auto call = id(matrix_backlight).turn_on();
            call.perform();
            id(matrix_display).update();
          }

          // Back to standing screen
          if ((laid || faced_down) && x < 0.13 && x > -0.65) {
            id(screen_laid) = false;
            id(screen_faced_down) = false;
            faced_down = false;
            laid = false;
            ESP_LOGI("ROTATE", "=== Screen is up ===");
            id(mario_anim_state) = 0;
            id(mario_anim_tick)  = 0;
            id(mario_y)          = id(mario_base_y);
            
            if (current_page == 1) {
              id(matrix_display).show_page(id(mario_page));
            }
            else if (current_page == 2) {
              id(matrix_display).show_page(id(minecraft_page));
            }
            else if (current_page == 3) {
              id(matrix_display).show_page(id(network_page));
            }
            // Turn on backlight
            auto call = id(matrix_backlight).turn_on();
            call.perform();
            id(exit_privacy_mode).execute();
            id(matrix_display).update();
          } 

          //privacy mode - faced down
          if (!faced_down && x > 0.7) {
            id(screen_faced_down) = true;
            faced_down = true;
            ESP_LOGI("ROTATE", "=== Screen is facing down ===");
            
            id(enter_privacy_mode).execute();
            id(matrix_display).update();
            return;
          }

  - interval: 100ms
    then:
      - lambda: |
          if (!id(global_is_timer_active) && !id(global_is_timer)) {
            if (id(page_no) == 1 || id(page_no) == 2) {  // only tick on content pages
              id(marquee_offset) = (id(marquee_offset) + 1) % 64;
            }
          }
          id(matrix_display).update();

output:
  - platform: gpio
    pin: GPIO11
    id: pa_ctrl
    # Output that bridges the light entity to the display

  - platform: template
    id: matrix_brightness_output
    type: float
    write_action:
      - lambda: |-
          if (state == 0) {
            id(matrix_display).set_brightness(0);
          } else {
            int brightness = id(sunstate).is_above_horizon() 
              ? ${day_brightness} 
              : ${night_brightness};
            id(matrix_display).set_brightness(brightness);
          }
i2c:
  - id: i2c_adc_dac
    #this is shared by SHTC3, QMI8658, and RTC
    sda: GPIO47
    scl: GPIO48
    scan: false
    # Raw register access to the ES8311 for the Speaker Gain boost (esp_codec_dev
    # owns the codec in TDM mode; we layer the boost on top of its DAC volume reg).
i2c_device:
  - id: es8311_raw
    i2c_id: i2c_adc_dac
    address: 0x18

# ===============================================================================
# Audio: Aec + Espressif-backed ESP Audio Stack
#type + mode	| AEC Engine	           | CPU (Core 0)	| MWW Compatible	|    Use Case
#sr+low_cost  |	esp_aec3 (linear, SIMD)|   ~23%       |	Yes (10/10)	    |    VA + MWW 
# ================================================================================
esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 4
  mode: sr_low_cost

esp_audio_stack:
  id: audio_stack
  processor_id: aec_processor

  i2s_lrclk_pin: GPIO38
  i2s_bclk_pin: GPIO43
  i2s_mclk_pin: GPIO12
  i2s_din_pin: GPIO39
  i2s_dout_pin: GPIO21
  sample_rate: 48000
  output_sample_rate: 16000
  slot_bit_width: 16  # 16-bit TDM slots x4
  bits_per_sample: 16

  task_core: 0
  task_priority: 19
  task_stack_size: 8192
  buffers_in_psram: true
  audio_task_stack_in_psram: true

  correct_dc_offset: true

  num_channels: 2 #Physical TX bus channel count on STD I2S: 1 or 2. Full-duplex codec-reference profiles often use 2 even while the public speaker stream remains mono.
  tx_channel: left
  codec:
    i2c_id: i2c_adc_dac
    input:
      type: es7210
      address: 0x40
      mic_selected: 0x0F
      gain_db: 24.0        # mic PGA
      ref_channel: 2       # MIC3 = the DAC loopback channel
      ref_gain_db: 0.0     # unity PGA
    output:
      type: es8311
      address: 0x18
      use_mclk: true
      no_dac_ref: true
  # mic config 
  use_tdm_reference: true
  tdm_total_slots: 4    
  tdm_mic_slots: [0,2]  # working
  tdm_ref_slot: 1       # Verified playback reference for AEC

  aec_reference: previous_frame

# Keep the FLAC decoder's working buffers out of internal RAM — it allocates
# on every TTS response, exactly when AEC + wake word + LVGL are all live.
audio:
  codecs:
    flac:
      buffer_memory: psram

microphone:
  - platform: esp_audio_stack
    id: box_mic
    esp_audio_stack_id: audio_stack  

speaker:
  - platform: esp_audio_stack
    id: box_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000
    bits_per_sample: 16
    num_channels: 1
    buffer_duration: 125ms
    #timeout: never               # Use "never" only for always-on raw streams

  # Virtual speakers to combine the announcement and media streams together into one output
  - id: mixing_speaker
    platform: mixer
    output_speaker: box_speaker
    num_channels: 1
    task_stack_in_psram: true
    source_speakers:
      - id: tts_speaker_mix
        timeout: 10s
        buffer_duration: 125ms
      - id: media_speaker_mix
        timeout: 10s
        buffer_duration: 100ms
  # Vritual speakers to resample each pipelines' audio, if necessary, as the mixer speaker requires the same sample rate
  - platform: resampler
    id: tts_speaker
    output_speaker: tts_speaker_mix
    sample_rate: 48000
    task_stack_in_psram: true
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_speaker_mix
    sample_rate: 48000
    task_stack_in_psram: true

media_player:
  - platform: sendspin
    id: sendspin_group_media_player
  - platform: speaker
    name: None
    id: speaker_media_player
    # media pipeline (instead of parking it half-owned) so TTS and timer
    # alarms can take the speaker graph while a stream is paused.
    pause_releases_pipeline: true
    volume_min: 0.2
    volume_max: 0.7
    volume_initial: 0.6
    buffer_size: 131072
    task_stack_in_psram: true
    media_pipeline:
      #used in music assistant.
      speaker: media_resampling_speaker
      sample_rate: 48000
      format: MP3
    announcement_pipeline:
      speaker: tts_speaker
      format: FLAC
      sample_rate: 48000
    files:
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
      - id: mario_sound_main
        file: /config/esphome/sound/super_mario_opening.flac
      - id: wake_word_triggered_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
      
    on_play:
      - lambda: |-
          using S = media_player::MediaPlayerState;
          // Music started during a VA turn and we didn't have music before → HA started something new
          if (id(va).is_running() && !id(speaker_was_playing)) {
            ESP_LOGI("post_va_media", "Media started during VA turn, flagging for post-VA resume");
            id(g_media_started_during_va) = true;
          }
      - script.execute: update_status
    
    on_pause:
      - script.execute: update_status
    on_announcement:
      # Stop the wake word (mWW or VA) if the mic is capturing
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
            # Ensure VA stops before moving on
            - if:
                condition:
                  - lambda: return id(wake_word_engine_location).state == "In Home Assistant";
                then:
                  - wait_until:
                      - not:
                          voice_assistant.is_running:
      # Since VA isn't running, this is user-intiated media playback. Draw the mute display
      - if:
          condition:
            and:
              - media_player.is_announcing:
                  id: speaker_media_player
              - not:
                  voice_assistant.is_running:
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
      - script.execute: update_status

    on_idle:
      #- lambda: id(speaker_was_playing) = false;   # ← add this line
      # Since VA isn't running, this is the end of user-intiated media playback. Restart the wake word.
      - delay: 150ms
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - script.execute: update_status
    #used to resume music playing
    on_state:
      if:
        condition:
          and:
            - switch.is_off: timer_ringing
            - not:
                voice_assistant.is_running:
            - not:
                media_player.is_announcing: speaker_media_player
        then:
          - script.execute: deferred_media_resume

voice_assistant:
  id: va
  microphone: box_mic
  media_player: speaker_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 1
  auto_gain: 31dBFS
  volume_multiplier: 4.0
  # When the voice assistant starts: pause audio.

  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - logger.log:
        tag: va
        format: "VA: on_listening"
    - globals.set:
        id: g_va_state
        value: "1"
    - globals.set:
        id: g_va_turn_id        # ← new global turn ID, increments each turn
        value: !lambda 'return id(g_va_turn_id) + 1;'
    # Clear the speaker-paused flag set by global_cancel. Without this, the wake-chime
    # plus subsequent TTS would play through the paused TX path and only produce silence.
    - lambda: id(box_speaker).set_pause_state(false);
    - lambda: id(user_cancelled) = false;
    # A turn is starting — any deferred barge-in restart is moot now. Clearing
    # here keeps a stale flag (e.g. from a turn whose on_end never consumed it)
    # from spawning a surprise extra turn after some later, unrelated turn.
    - lambda: id(pending_wake_restart).clear();
    - globals.set:
        id: g_mww_recent
        value: "0"
    - globals.set:
        id: g_barge_in_pending
        value: "0"
    - script.stop: mww_failsafe
    #- script.stop: barge_failsafe
    - script.execute: update_status
    - media_player.speaker.play_on_device_media_file:
        media_file: wake_word_triggered_sound
        announcement: true
        id: speaker_media_player
  on_stt_vad_end:
    - logger.log:
        tag: va
        format: "VA: on_stt_vad_end (thinking)"
    - globals.set:
        id: g_va_state
        value: "2"
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: update_status

  on_stt_end:
    - script.execute: draw_display

  on_tts_start:
    - logger.log:
        tag: va
        format: "VA: on_tts_start (speaking)"
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - globals.set:
        id: g_va_state
        value: "3"
    - script.execute: update_status

  on_end:
    # Branch tracer — INFO so it survives the production log level.
    - logger.log:
        tag: barge
        level: INFO
        format: "on_end > pending='%s' announcing=%d va_running=%d"
        args:
          - id(pending_wake_restart).c_str()
          - 'id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING'
          - 'id(va).is_running()'
    - script.execute: #barge_log
        id: barge_log
        msg: !lambda |-
          char b[64];
          snprintf(b, sizeof(b), "end p=%s announcing=%d voice_assistant=%d",
                   id(pending_wake_restart).empty() ? "-" : id(pending_wake_restart).c_str(),
                   (int) (id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING),
                   (int) id(va).is_running());
          return std::string(b);
    
    - lambda: |-
        // Snapshot the turn id so the delayed cleanup can detect a new turn started
        id(g_end_turn_snapshot) = id(g_va_turn_id);
    - delay: 150ms     # ← let a continuing turn's on_listening preempt us
    - if:
        condition:
          lambda: 'return id(g_va_turn_id) == id(g_end_turn_snapshot);'
        then:
          # No new turn started — this really is the end
          - script.execute: va_end_handler
          - script.execute: media_started_by_va
          - script.execute: update_status
          - globals.set:
              id: g_va_state
              value: "0"
          - if:
              condition:
                lambda: 'return id(speaker_was_playing);'
              then:
                - script.execute: deferred_media_resume
        else:
          - logger.log:
              tag: va
              level: INFO
              format: "on_end: new turn started, skipping cleanup"

  on_error:
    - logger.log:
        tag: va
        format: "VA: on_error (code=%s, msg=%s)"
        args: ['code.c_str()', 'message.c_str()']
    # If a barge-in is in flight, don't clobber the pending restart with
    # an error state — let on_end handle the restart.
    - if:
        condition:
          lambda: 'return id(g_barge_in_pending) != 0;'
        then:
          - logger.log:
              tag: va
              format: "VA: error during barge-in, keeping barge flag"
        else:
          - globals.set:
              id: g_mww_recent
              value: "0"
          - if:
              condition:
                lambda: 'return !id(init_in_progress);'
              then:
                - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
                - globals.set:
                    id: g_va_state
                    value: "4"  
                - script.execute: draw_display
                - delay: 1s
                - globals.set:
                    id: g_va_state
                    value: "0"
                - if:
                    condition:
                      switch.is_off: mute
                    then:
                      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
                    else:
                      - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};

          - script.execute: update_status
  on_client_connected:
    - logger.log:
        tag: va
        format: "VA: client connected"
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display

  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: draw_display

  # ── Timer events ────────────────────────────────────────────────────────
  on_timer_started:
    - script.execute: draw_display
  on_timer_cancelled:
    - script.execute: draw_display
  on_timer_updated:
    - script.execute: draw_display
  on_timer_tick:
    - script.execute: draw_display

  on_timer_finished:
    - switch.turn_on: timer_ringing
    - component.update: matrix_display
    - wait_until:
        media_player.is_announcing:
          id: speaker_media_player
    - lambda: id(voice_assistant_phase) = ${voice_assist_timer_finished_phase_id};
    - script.execute: draw_display

micro_wake_word:
  id: mww
  stop_after_detection: false
  microphone: box_mic
  models:
    - hey_jarvis
  vad:
    probability_cutoff: 0.20
    sliding_window_size: 1
  on_wake_word_detected:
    - logger.log:
        tag: mww
        level: INFO   # default is DEBUG, which the global INFO level compiles out
        format: "MWW fired: %s"
        args:
          - 'wake_word.c_str()'
    - globals.set:
        id: g_mww_recent
        value: "1"
    - script.execute: update_status
    - script.execute: mww_failsafe
    - if:
        condition:
          or:
            - voice_assistant.is_running:
            - lambda: 'return id(g_barge_in_pending) != 0;'
        then:
          - logger.log:
              tag: mww
              format: "MWW: barge-in, stopping VA"
          - globals.set:
              id: g_barge_in_pending
              value: "1"
          - script.execute: barge_failsafe
          - voice_assistant.stop:
          - media_player.stop:
              id: speaker_media_player
              announcement: true
    # Duck media speaker volume if playing music
    - if:  #ducking volume
        condition:
          lambda: |-
            using S = media_player::MediaPlayerState;
            bool music_active = (id(speaker_media_player).state == S::MEDIA_PLAYER_STATE_PLAYING)
                             && (id(speaker_media_player).state != S::MEDIA_PLAYER_STATE_ANNOUNCING);
            if (music_active) id(speaker_was_playing) = true;
            return music_active;
        then:
          - if:
              condition:
                lambda: 'return id(g_ducking_active) == 0;'
              then:
                - mixer_speaker.apply_ducking:
                    id: media_speaker_mix
                    decibel_reduction: 20
                    duration: 200ms
                - globals.set:
                    id: g_ducking_active
                    value: "1"
           
    - if:
        condition:
          or:
            - voice_assistant.is_running:
            - and:
                - media_player.is_announcing:
                    id: speaker_media_player
                - lambda: 'return !id(user_cancelled);'
        then:
          - if:
              condition:
                lambda: 'return wake_word != "Stop";'
              then:
                - lambda: |-
                    id(pending_wake_restart) = wake_word;
                    id(pending_set_ms) = millis();

          - if:
              condition:
                lambda: 'return !id(user_cancelled);'
              then:
                - script.execute: global_cancel
          - if:
              condition:
                and:
                  - lambda: 'return !id(pending_wake_restart).empty();'
                  - not:
                      voice_assistant.is_running:
              then:
                - voice_assistant.start:
                    wake_word: !lambda return id(pending_wake_restart);
                - lambda: id(pending_wake_restart).clear();
        else:
          # Idle: only the activation word starts a new turn.
          # 'Stop' while idle is a no-op (logged above) so it cannot summon the assistant.
          - if:
              condition:
                lambda: 'return wake_word != "Stop";'
              then:
                - voice_assistant.start:
                    wake_word: !lambda return wake_word;  


script:
  - id: update_clock
    then:
      - component.update: matrix_display

  - id: play_mario_sound
    then:
      - media_player.speaker.play_on_device_media_file:
          media_file: mario_sound_main
          announcement: true
          id: speaker_media_player

  - id: select_display_page
    then:
      - lambda: |-
          if (id(display_page).state == "Mario") {
            id(matrix_display).show_page(id(mario_page));
          } else if (id(display_page).state == "Minecraft") {
            id(matrix_display).show_page(id(minecraft_page));
          } else if (id(display_page).state == "Network") {
            id(matrix_display).show_page(id(network_page));
          }
      - component.update: matrix_display

  - id: draw_display
    then:
      - lambda: |
          // Define strip colors and pattern per voice_assistant_phase
          // Rows 30-31 (bottom 2 pixels of 32-row display)
          const int strip_y = 30;
          const int width = 64;
          const int segment = 8; // length of each colored segment in marquee
          // --- Timer takes priority over marquee ---
          id(check_if_timers_active).execute();
          id(check_if_timers).execute();
          if (id(global_is_timer_active) || id(global_is_timer)) {
            id(draw_timer_timeline).execute();
            return;  // exit here, skip the marquee
          }

          // ── Music playing visualiser — bottom row solid black. bottom 2 rows (y=30, y=31) ──────────────
          if ( id(page_no) == 1 || id(page_no) == 2 ){
            for (int x = 0; x < width; x++) {
              id(matrix_display).draw_pixel_at(x, 29, id(col_black));
              id(matrix_display).draw_pixel_at(x, 30, id(col_black));
              id(matrix_display).draw_pixel_at(x, 31, id(col_black));
            }
          }
          using S = media_player::MediaPlayerState;
          bool music_active = (id(speaker_media_player).state == S::MEDIA_PLAYER_STATE_PLAYING)
                           && !(id(speaker_media_player).state == S::MEDIA_PLAYER_STATE_ANNOUNCING);

          if (music_active) {
            static uint8_t bar_h[16]   = {0};   // current height per column (0-2)
            static uint8_t bar_tgt[16] = {0};   // target height per column
            static uint16_t anim_tick   = 0;
            static uint8_t lfsr          = 0xACu;

            anim_tick++;

            // Update targets every ~6 frames so it feels like bouncing bars
            if ((anim_tick % 6) == 0) {
              for (int col = 0; col < 16; col++) {
                // cheap pseudo-random via LFSR — no stdlib rand() needed
                lfsr = (lfsr >> 1) ^ (-(lfsr & 1u) & 0xB8u);
                uint8_t r = lfsr ^ (col * 37) ^ (uint8_t)(anim_tick >> 2);
                if      (r < 60)  bar_tgt[col] = 0;   // ~24% chance off
                else if (r < 140) bar_tgt[col] = 1;   // ~31% chance 1 row
                else              bar_tgt[col] = 2;   // ~45% chance 2 rows
              }
            }

            // Snap heights toward targets (instant on, instant off — LED matrix
            // has no persistence so smooth lerp would just flicker)
            for (int col = 0; col < 16; col++) {
              if (bar_h[col] < bar_tgt[col]) bar_h[col]++;
              else if (bar_h[col] > bar_tgt[col]) bar_h[col]--;
            }

            // Render — 4px wide columns, 1px dark gap between each
            for (int col = 0; col < 16; col++) {
              // Hue cycles across columns + slowly shifts with tick for rainbow effect
              // Colour order: red→yellow→green→cyan→blue→magenta repeating
              uint8_t hue_idx = ((col * 4) + (anim_tick >> 3)) % 24;
              Color bar_color;
              if      (hue_idx <  4) bar_color = Color(255, hue_idx * 64, 0);        // red→yellow
              else if (hue_idx <  8) bar_color = Color(255 - (hue_idx-4)*64, 255, 0); // yellow→green
              else if (hue_idx < 12) bar_color = Color(0, 255, (hue_idx-8)*64);      // green→cyan
              else if (hue_idx < 16) bar_color = Color(0, 255-(hue_idx-12)*64, 255); // cyan→blue
              else if (hue_idx < 20) bar_color = Color((hue_idx-16)*64, 0, 255);     // blue→magenta
              else                   bar_color = Color(255, 0, 255-(hue_idx-20)*64); // magenta→red

              for (int px = 0; px < 3; px++) {  // 3 lit pixels, 1 gap
                int x = col * 4 + px;
                if (bar_h[col] >= 1) id(matrix_display).draw_pixel_at(x, 31, bar_color);
                if (bar_h[col] >= 2) id(matrix_display).draw_pixel_at(x, 30, bar_color);
              }
            }
            return;  // skip whatever else would render at the bottom
          }
          //marquee effect for va
          Color color1, color2;
          bool skip_marquee = false;
          switch (id(voice_assistant_phase)) {
            case ${voice_assist_listening_phase_id}:
              // Green breathing/moving strip - listening
              color1 = Color(20, 140, 30);
              color2 = Color(0, 80, 0);
              break;
            case ${voice_assist_thinking_phase_id}:
              // Yellow chasing - thinking
              color1 = Color(255, 200, 0);
              color2 = Color(80, 60, 0);
              break;
            case ${voice_assist_replying_phase_id}:
              // Cyan sweep - replying
              color1 = Color(0, 200, 255);
              color2 = Color(0, 60, 80);
              break;
            case ${voice_assist_error_phase_id}:
              // Red flash - error
              color1 = Color(255, 0, 0);
              color2 = Color(60, 0, 0);
              break;
            case ${voice_assist_muted_phase_id}:
              // Dim orange - muted
              color1 = Color(180, 40, 0);
              color2 = Color(140, 10, 0);
              break;
            case ${voice_assist_not_ready_phase_id}:
              // Purple - not ready
              color1 = Color(100, 0, 150);
              color2 = Color(30, 0, 50);
              break;
            case ${voice_assist_timer_finished_phase_id}:
              // White flash - timer done
              color1 = Color(255, 255, 255);
              color2 = Color(60, 60, 60);
              break;
            default:
              // Idle: slow Brown brick style
              skip_marquee = true;
              color1 = id(col_ground_fill);
              color2 = id(col_black);
              break;
          }
          //In mario page - Ground Row 29 always solid
          if ( id(page_no) == 1){
            
            for (int x = 0; x < width; x++) {
              id(matrix_display).draw_pixel_at(x, 29, id(col_ground_fill));
            }
            //Row 30 and 31 in either static or marquee
            if (skip_marquee) {
              // Draw brick strip only, no marquee
              const int brick_y = 30;
              const int width   = 64;
            
              for (int row = 0; row < 2; row++) {
                for (int x = 0; x < width; x++) {
                  Color c = (x % 6 == 0) ? id(col_black) : id(col_ground_fill);
                  id(matrix_display).draw_pixel_at(x, brick_y + row, c);
                }
              }
              return;
            }
          }
          
          // Minecraft page - solid dirt strip when idle
          if (id(page_no) == 2 && skip_marquee) {
            for (int x = 0; x < width; x++) {
              id(matrix_display).draw_pixel_at(x, strip_y,     id(mc_dirt_dark));
              id(matrix_display).draw_pixel_at(x, strip_y + 1, id(mc_dirt_dark));
            }
            return;
          }

          int offset = id(marquee_offset);
          for (int x = 0; x < width; x++) {
            // Create alternating segments that scroll with offset
            int pos = (x + offset) % (segment * 2);
            Color c = (pos < segment) ? color1 : color2;
            id(matrix_display).draw_pixel_at(x, strip_y,     c);
            id(matrix_display).draw_pixel_at(x, strip_y + 1, c);
          }

  - id: fetch_first_active_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_active_timer) = output_timer;
  - id: check_if_timers_active
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
            }
          }
          id(global_is_timer_active) = output;
  - id: fetch_first_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_timer) = output_timer;
  - id: check_if_timers
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
            }
          }
          id(global_is_timer) = output;    

  - id: draw_timer_timeline
    then:
      - lambda: |
          id(check_if_timers_active).execute();
          id(check_if_timers).execute();
          if (id(global_is_timer_active)) {
            id(fetch_first_active_timer).execute();
            int active_pixels = round( 64.0 * id(global_first_active_timer).seconds_left / max(id(global_first_active_timer).total_seconds, static_cast<uint32_t>(1)) );
            // Clear the row first
            for (int x = 0; x < 64; x++) {
              id(matrix_display).draw_pixel_at(x, 29, Color::BLACK);
            }
            // Draw progress in active color
            for (int x = 0; x < active_pixels; x++) {
              id(matrix_display).draw_pixel_at(x, 29, id(active_timer_color));
            }
          } else if (id(global_is_timer)) {
            id(fetch_first_timer).execute();
            int active_pixels = round( 64.0 * id(global_first_timer).seconds_left / max(id(global_first_timer).total_seconds, static_cast<uint32_t>(1)) );
            // Clear the row first
            for (int x = 0; x < 64; x++) {
              id(matrix_display).draw_pixel_at(x, 29, Color::BLACK);
            }
            // Draw progress in paused color
            for (int x = 0; x < active_pixels; x++) {
              id(matrix_display).draw_pixel_at(x, 29, id(paused_timer_color));
            }
          }
  # Set the voice assistant phase to idle or muted, depending on if the software mute switch is activated
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
  - id: enter_privacy_mode
    then:
      - if:
          condition:
            lambda: 'return !id(privacy_mode);'
          then:
            - lambda: |-
                id(privacy_mode) = true;
                id(privacy_music_was_playing) = id(study_room_speaker_state).state == "playing";
            - homeassistant.action:
                action: media_player.volume_mute
                data:
                  entity_id: ${speaker_in_ma}
                  is_volume_muted: "true"

            - if:
                condition:
                  lambda: |-
                    return id(privacy_music_was_playing);
                then:
                  - homeassistant.action:
                      action: media_player.media_pause
                      data:
                        entity_id: ${speaker_in_ma}

            - lambda: |-
                auto call = id(matrix_backlight).turn_off();
                call.perform();

  - id: exit_privacy_mode
    then:
      - if:
          condition:
            lambda: 'return id(privacy_mode);'
          then:
            - lambda: |-
                id(privacy_mode) = false;

            - homeassistant.action:
                action: media_player.volume_mute
                data:
                  entity_id: ${speaker_in_ma}
                  is_volume_muted: "false"

            - if:
                condition:
                  lambda: 'return id(privacy_music_was_playing);'
                then:
                  - homeassistant.action:
                      action: media_player.media_play
                      data:
                        entity_id: ${speaker_in_ma}

                  - lambda: |-
                      id(privacy_music_was_playing) = false;

            - lambda: |-
                auto call = id(matrix_backlight).turn_on();
                call.perform();
  
  - id: speaker_volume_up
    mode: restart
    then:
      - lambda: |-
          id(speaker_volume_target) += 0.03;
          if (id(speaker_volume_target) > 1.0) {
            id(speaker_volume_target) = 1.0;
          }

          auto call = id(speaker_media_player).make_call();
          call.set_volume(id(speaker_volume_target));
          call.perform();

  - id: speaker_volume_down
    mode: restart
    then:
      - lambda: |-
          id(speaker_volume_target) -= 0.03;
          if (id(speaker_volume_target) < 0.0) {
            id(speaker_volume_target) = 0.0;
          }

          auto call = id(speaker_media_player).make_call();
          call.set_volume(id(speaker_volume_target));
          call.perform();
  - id: apply_speaker_gain
    mode: queued
    max_runs: 2
    then:
      - lambda: |-
          float db = id(speaker_gain).state;
          if (isnan(db)) db = 6.0f;
          db = std::max(0.0f, std::min(12.0f, db));
          const int delta = (int) lroundf(db * 2.0f);
          uint8_t reg = 0;
          if (!id(es8311_raw).read_byte(0x32, &reg)) return;
          int base;
          if (id(gain_last_written) >= 0 && reg == (uint8_t) id(gain_last_written)) {
            base = id(gain_base);   // untouched since our last write
          } else {
            base = reg;             // codec rewrote the register: new base
          }
          int target = base + delta;
          if (target > 255) target = 255;
          if ((uint8_t) target != reg) {
            id(es8311_raw).write_byte(0x32, (uint8_t) target);
          }
          id(gain_base) = base;
          id(gain_last_written) = target;
  # On-device forensic trail for the barge-in machinery
  - id: barge_log
    parameters:
      msg: string
    then:
      - lambda: |-
          std::string s = id(barge_trail).has_state() ? id(barge_trail).state : "";
          if (s.length() > 170) s = s.substr(s.length() - 170);
          if (!s.empty()) s += " | ";
          s += msg;
          id(barge_trail).publish_state(s);

  - id: boost_mww_priority
    mode: restart
    then:
      - delay: 1s
      - lambda: |-
          TaskHandle_t mww_task = xTaskGetHandle("mww");
          if (mww_task) {
            vTaskPrioritySet(mww_task, 8);
          }

  - id: global_cancel
    then:
      - lambda: id(user_cancelled) = true;
      - voice_assistant.stop:
      - media_player.stop:
          announcement: true
          id: speaker_media_player
      - media_player.stop: speaker_media_player
      - lambda: |-
          id(box_speaker).set_pause_state(true);
          id(audio_stack).stop_speaker();
      - switch.turn_off: timer_ringing

      # When a barge-in restart is pending (second activation word), go straight
      # to the LISTENING visuals — the restart lands a few hundred ms later and
      # the screen should never flash the idle page between the two turns.
      # Cancel-only paths (Stop, touch) keep the idle/mute page as before.
      - if:
          condition:
            lambda: 'return id(pending_wake_restart).empty();'
          then:
            - script.execute: set_idle_or_mute_phase
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
      - script.execute: update_status
   
  - id: barge_failsafe
    mode: restart
    then:
      - delay: 15s
      - if:
          condition:
            lambda: 'return id(g_barge_in_pending) != 0;'
          then:
            - logger.log:
                level: WARN
                format: "Barge failsafe: clearing stuck g_barge_in_pending"
            - globals.set:
                id: g_barge_in_pending
                value: "0"
            - script.execute: update_status
  #  # Core scripts -  voice assistant duplex
                
  # Starts either mWW or the streaming wake word, depending on the configured location
  - id: start_wake_word
    then:
      # MWW owns the microphone consumer and starts the AFE/I2S path. Do not
      # start it from early boot or generic API callbacks; wait for init to
      # clear and make every caller pass through this single gate.
      - wait_until:
          condition:
            lambda: 'return millis() >= 10000;'
          timeout: 10s
      - delay: 2s
      - if:
          condition:
            and:
              # run only if none met: initializing, ota in progress, wake word not enabled, mute,
              #va running, wake word running, media player announcing, ww is on device.
              - lambda: 'return !id(init_in_progress);'
              - lambda: 'return !id(g_ota_in_progress);'
              - switch.is_off: mute
              - not:
                  voice_assistant.is_running:
              - not:
                  micro_wake_word.is_running:
              - not:
                  media_player.is_announcing:
                    id: speaker_media_player
              - lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
            - globals.set:
                id: g_mww_running
                value: "true"
            - delay: 1s
            - lambda: |-
                TaskHandle_t mww_task = xTaskGetHandle("mww");
                if (mww_task) {
                  vTaskPrioritySet(mww_task, 8);
                }
            - logger.log:
                tag: mww
                format: "MWW: safe start"
          else:
            - logger.log:
                level: INFO
                tag: mww
                format: "MWW: safe start skipped init=%d ota=%d mute=%d va=%d mww=%d announcing=%d"
                args:
                  - id(init_in_progress)
                  - id(g_ota_in_progress)
                  - id(mute).state
                  - id(va).is_running()
                  - id(mww).is_running()
                  - id(speaker_media_player).state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous: # continuous wake word only supported when wake word is "In Home Assistant"
  # Stops either mWW or the streaming wake word, depending on the configured location
  - id: stop_wake_word
    then:
      - globals.set:
          id: g_mww_running
          value: "false"
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - micro_wake_word.stop:

  - id: va_end_handler
    mode: restart
    then:
      - wait_until:
          condition:
            or:
              - media_player.is_announcing:
                  id: speaker_media_player
              - speaker.is_playing:
                  id: tts_speaker
          timeout: 2s
      - wait_until:
          condition:
            and:
              - not:
                  media_player.is_announcing:
                    id: speaker_media_player
              - not:
                  speaker.is_playing:
                      id: tts_speaker
          # Long replies can keep the TTS pipeline draining well after VA on_end.
          # A short timeout here forces idle cleanup and truncates the tail.
          timeout: 90s
      - if:
          condition:
            or:
              - media_player.is_announcing:
                  id: speaker_media_player
              - speaker.is_playing:
                  id: tts_speaker
          then:
            - logger.log:
                level: WARN
                format: "VA: TTS drain timeout, forcing cleanup"
            - media_player.stop:
                id: speaker_media_player
                announcement: true
      #- delay: 100ms
      #- voice_assistant.stop:   #this stops voice asssistant unconditionally
      # ── give HA a window to start a continuation before we stop VA ──
      - delay: 600ms
      - if:
          condition:
            lambda: |-
              // If VA moved into listening again (g_va_state==1) during our wait,
              // a continuation has already taken over — don't stop it.
              return id(g_va_state) == 1;
          then:
            - logger.log:
                tag: va
                level: INFO
                format: "VA: continuation detected, skipping stop"
          else:
            - voice_assistant.stop:
            - if:
                condition:
                  lambda: 'return id(g_barge_in_pending) != 0;'
                then:
                  - logger.log:
                      tag: va
                      format: "VA: barge restart"
                  - wait_until:
                      condition:
                        not:
                          voice_assistant.is_running:
                      timeout: 2s
                  - delay: 200ms
                  - voice_assistant.start:
                else:
                  - logger.log:
                      tag: va
                      format: "VA: end, clearing state"
                  - globals.set:
                      id: g_va_state
                      value: "0"
                  - script.execute: update_status
                  - script.execute: set_idle_or_mute_phase
                  - script.execute: start_wake_word
                  - script.execute: deferred_media_resume


  - id: mww_failsafe
    mode: restart
    then:
      - delay: 3s
      - logger.log:
          level: WARN
          format: "MWW failsafe: clearing stuck g_mww_recent"
      - globals.set:
          id: g_mww_recent
          value: "0"
      - script.execute: update_status
  - id: update_status
    mode: restart
    then:
      - lambda: |-
          // Central UI reducer. Priority order:
          //   init/connectivity > mute states > wake-word
          //   > VA (listening/thinking/responding) > intercom call
          //   > VA error > media playback > idle.
          // Device-local overlays such as timer alarm, settings pages, or
          // "call ended" pages live in each renderer because not every full
          // device includes those optional UI concepts.
          // VA responding sits above intercom so concurrent TTS always shows
          // blue even while a call is active; when TTS ends the evaluator
          // falls back to the underlying call (green) or music (blue).
          // Media playback target covers both STATE_PLAYING and
          // STATE_ANNOUNCING so the LED stays blue when music pauses for a
          // TTS announcement instead of flashing to off and back.
          using S = media_player::MediaPlayerState;
          auto mp_state = id(speaker_media_player).state;
          bool media_active = (mp_state == S::MEDIA_PLAYER_STATE_PLAYING ||
                               mp_state == S::MEDIA_PLAYER_STATE_ANNOUNCING);
          int state = ${ui_state_idle};
          int led = 0;
          if (id(init_in_progress)) {
            state = ${ui_state_init};
          } else if (!wifi::global_wifi_component->is_connected()) {
            state = ${ui_state_no_wifi};
          } else if (!api::global_api_server->is_connected()) {
            state = ${ui_state_no_ha};
          } else if (id(g_mww_recent) || id(g_barge_in_pending)) {
            state = ${ui_state_mww_recent};
            led = 4;
          } else if (id(g_va_state) == 1) {
            state = ${ui_state_va_listening};
            led = 5;
          } else if (id(g_va_state) == 2) {
            state = ${ui_state_va_thinking};
            led = 6;
          } else if (id(g_va_state) == 3) {
            state = ${ui_state_va_replying};
            led = 7;
          }  else if (id(g_va_state) == 4) {
            state = ${ui_state_va_error};
            led = 11;
          } else if (media_active) {
            state = ${ui_state_media};
            led = 12;
          }
          id(ui_state) = state;
      - script.execute: draw_display
      

  - id: deferred_media_resume
    mode: restart
    then:
      - wait_until:
          condition:
            not:
              media_player.is_announcing:
                id: speaker_media_player
          timeout: 12s
      - delay: 300ms
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - not:
                  media_player.is_announcing:
                    id: speaker_media_player
              - lambda: |-
                  using S = media_player::MediaPlayerState;
                  return id(speaker_was_playing)
                      || (id(speaker_media_player).state == S::MEDIA_PLAYER_STATE_PAUSED);
          then:
            - logger.log:
                tag: media_resume
                level: INFO
                format: "Unducking media (was_playing=%d ducking=%d)"
                args:
                  - 'id(speaker_was_playing)'
                  - 'id(g_ducking_active)'
            - if:
                condition:
                  lambda: 'return id(g_ducking_active) == 1;'
                then:
                  - mixer_speaker.apply_ducking:
                      id: media_speaker_mix
                      decibel_reduction: 0
                      duration: 500ms
                  - globals.set:
                      id: g_ducking_active
                      value: "0"
            - lambda: 'id(speaker_was_playing) = false;'
            # ── retry loop: re-duck check every 1s for up to 5 attempts ──
            - repeat:
                count: 5
                then:
                  - delay: 1s
                  - if:
                      condition:
                        lambda: 'return id(g_ducking_active) == 1;'
                      then:
                        - logger.log:
                            tag: media_resume
                            level: WARN
                            format: "Unduck retry (ducking still active)"
                        - if:
                            condition:
                              and:
                                - not:
                                    voice_assistant.is_running:
                                - not:
                                    media_player.is_announcing:
                                      id: speaker_media_player
                            then:
                              - mixer_speaker.apply_ducking:
                                  id: media_speaker_mix
                                  decibel_reduction: 0
                                  duration: 500ms
                              - globals.set:
                                  id: g_ducking_active
                                  value: "0"
                            else:
                              - logger.log:
                                  tag: media_resume
                                  level: WARN
                                  format: "Unduck retry skipped: va=%d announcing=%d"
                                  args:
                                    - 'id(va).is_running()'
                                    - 'id(speaker_media_player).state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING'
            # ── restart MWW after unduck settles ──
            - delay: 500ms
            - script.execute: start_wake_word
          else:
            - lambda: |-
                using S = media_player::MediaPlayerState;
                ESP_LOGW("media_resume", "unduck skipped: was_playing=%d va=%d announcing=%d state=%d",
                  id(speaker_was_playing),
                  id(va).is_running(),
                  id(speaker_media_player).state == S::MEDIA_PLAYER_STATE_ANNOUNCING,
                  (int)id(speaker_media_player).state);
            
  - id: media_started_by_va
    mode: restart
    then:
      - wait_until:
          condition:
            not:
              media_player.is_announcing:
                id: speaker_media_player
          timeout: 12s
      - wait_until:
          condition:
            not:
              voice_assistant.is_running:
          timeout: 5s
      - delay: 800ms
      - if:
          condition:
            and:
              - lambda: 'return id(g_media_started_during_va);'
              - not:
                  voice_assistant.is_running:
              - not:
                  media_player.is_announcing:
                    id: speaker_media_player
              - lambda: |-
                  return id(speaker_media_player).state
                      == media_player::MEDIA_PLAYER_STATE_PAUSED;
          then:
            - logger.log:
                tag: post_va_media
                level: INFO
                format: "Media was started during VA then paused by pipeline release, resuming"
            - homeassistant.action:
                action: media_player.media_play
                data:
                  entity_id: ${speaker_in_ma}
            - lambda: 'id(g_media_started_during_va) = false;'
          else:
            - lambda: |-
                ESP_LOGI("post_va_media", "No resume needed: flag=%d state=%d announcing=%d va=%d",
                  id(g_media_started_during_va),
                  (int)id(speaker_media_player).state,
                  (int)(id(speaker_media_player).state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING),
                  (int)id(va).is_running());
            - lambda: 'id(g_media_started_during_va) = false;'      

switch:
  - platform: template
    name: Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - microphone.unmute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: draw_display
    on_turn_on:
      - microphone.mute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
      - script.execute: draw_display

  - platform: output
    id: speaker_switch
    name: "Speaker Enable"
    output: pa_ctrl
    restore_mode: ALWAYS_ON

  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      # Turn off the repeat mode and disable the pause between playlist items
      - lambda: |-
              id(speaker_media_player)
                ->make_call()
                .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
                .set_announcement(true)
                .perform();
              id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      # Stop playing the alarm
      - media_player.stop:
          id: speaker_media_player
          announcement: true
    on_turn_on:
      # Turn on the repeat mode and pause for 1000 ms between playlist items/repeats
      - lambda: |-
            id(speaker_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
              .set_announcement(true)
              .perform();
            id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      #make sure volume is not too small for alarm.
      - speaker.volume_set:
          id: box_speaker
          volume: 60%

      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_sound
          announcement: true
      ##play for 30s.
      - delay: 30s
      - switch.turn_off: timer_ringing

  - platform: template
    id: local_media_mute
    icon: 'mdi:volume-off'
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_on:
      then:
        - homeassistant.action:
            action: media_player.volume_set
            data:
              entity_id: media_player.speaker_media_player
              volume_level: "0"
    on_turn_off:
      - homeassistant.action:
          action: media_player.volume_set
          data:
            entity_id: media_player.speaker_media_player
            volume_level: !lambda 'return id(local_volume_value);'
  # Runtime AEC on/off (packages/esp_audio_stack/aec_controls.yaml). Restores
  # ON — leave it on for normal use, barge-in ('Stop' during TTS) depends on it.
  - platform: esp_audio_stack
    esp_audio_stack_id: audio_stack
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: RESTORE_DEFAULT_OFF

# Light entity exposed to Home Assistant
light:
  - platform: monochromatic
    name: "Matrix Display Backlight"
    id: matrix_backlight
    output: matrix_brightness_output
    default_transition_length: 0s
    restore_mode: RESTORE_DEFAULT_ON

display:
  - platform: hub75
    id: matrix_display
    clock_speed: 16MHZ
    board: adafruit-matrix-portal-s3
    shift_driver: ICN2038S
    double_buffer: True  #This stops the whole screen flicking when animation.
    panel_width: 64
    panel_height: 32
    brightness: ${day_brightness}
    bit_depth: 5
    update_interval: 33ms
    scan_wiring: STANDARD_TWO_SCAN
    #Pins color.
    r1_pin: GPIO4
    g1_pin: GPIO6
    b1_pin: GPIO5
    r2_pin: GPIO7
