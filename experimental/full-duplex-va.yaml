i2c:
  - id: i2c_adc_dac
    #this is shared by SHTC3, QMI8658, and RTC
    sda: GPIO47
    scl: GPIO48
    scan: false
# Raw register access to the ES8311 for the Speaker Gain boost (esp_codec_dev
# owns the codec in TDM mode; we layer the boost on top of its DAC volume reg).
i2c_device:
  - id: es8311_raw
    i2c_id: i2c_adc_dac
    address: 0x18

##esp_aec:
#  id: aec_processor
#  sample_rate: 16000
#  filter_length: 8
#  mode: sr_low_cost

# =============================================================================
# Audio: AFE + Espressif-backed ESP Audio Stack
# =============================================================================
esp_afe:
  id: afe_processor
  type: fd
  mode: high_perf
  mic_num: 2
  aec_filter_length: 4
  aec_nlp_level: normal
  memory_alloc_mode: more_psram
  # Espressif layout:
  # - SE/BSS worker preference stays on Core 1 at the official low priority.
  # - GMF AFE manager feed/fetch tasks stay on different cores, as Espressif's
  #   own GMF troubleshooting recommends for avoiding AFE task WDT.
  task_core: 1
  task_priority: 5
  ringbuf_size: 8
  feed_task_core: 0
  feed_task_priority: 5
  feed_task_stack_size: 3072
  fetch_task_core: 1
  fetch_task_priority: 5
  fetch_task_stack_size: 3072
  se_enabled: true
  ns_enabled: true
  vad_enabled: true
  continuous_vad: true
  # Dual-mic GMF follows Espressif's official element output path. Keep AEC on
  # for normal audio quality; AEC-off on dual-mic BSS targets may sound metallic.
  # WS3 keeps AGC out of the runtime profile. It can improve MWW sensitivity
  # under playback, but on this target it causes TTS/media stutter and any
  # runtime toggle requires a full AFE rebuild.
  agc_enabled: false
  # Worst-case HTTPS media/TTS + intercom needs contiguous internal heap for
  # ESPHome API frame reads, TLS and I2S. Keep AFE bridge buffers in PSRAM on
  # this full profile; the small PSRAM latency cost is preferable to API
  # bad_alloc crashes during Assist/TTS responses.
  feed_buf_in_psram: true       # ~6 KB hot scratch on 2-mic + ref FD
  feed_ring_in_psram: true      # ~24 KB staging ring on 2-mic + ref FD
  fetch_ring_in_psram: true     # ~8 KB output ring

esp_audio_stack:
  id: audio_stack
  i2s_lrclk_pin: GPIO38
  i2s_bclk_pin: GPIO43
  i2s_mclk_pin: GPIO12
  i2s_din_pin: GPIO39
  i2s_dout_pin: GPIO21
  
  sample_rate: 48000
  output_sample_rate: 48000
  slot_bit_width: 16  # 16-bit TDM slots x4
  bits_per_sample: 16
  # Do NOT set dma_frame_num here: shrinking the DMA backlog below the auto
  # sizing (~10 ms/descriptor) causes audible TX underruns on this device.
  correct_dc_offset: true
  processor_id: afe_processor
  num_channels: 2 #Physical TX bus channel count on STD I2S: 1 or 2. Full-duplex codec-reference profiles often use 2 even while the public speaker stream remains mono.

  codec:
    i2c_id: i2c_adc_dac
    input:
      type: es7210
      address: 0x40
      mic_selected: 0x0F
      gain_db: 24.0        # mic PGA
      ref_channel: 2       # MIC3 = the DAC loopback channel
      ref_gain_db: 0.0     # unity PGA
    output:
      type: es8311
      address: 0x18
      use_mclk: true
      no_dac_ref: true
  tdm_total_slots: 4
  tdm_mic_slots: [0]
  tdm_ref_slot: 1        # Verified playback reference for AEC
  tx_channel: left
  use_tdm_reference: true
  buffers_in_psram: true
  audio_task_stack_in_psram: true
  #aec_reference: previous_frame   # ignored while use_tdm_reference is set

audio:
  codecs:
    flac:
      buffer_memory: psram

microphone:
  - platform: esp_audio_stack
    id: box_mic
    esp_audio_stack_id: audio_stack

speaker:
  - platform: esp_audio_stack
    id: box_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000
    bits_per_sample: 16
    num_channels: 1
    buffer_duration: 125ms
  # Virtual speakers to combine the announcement and media streams together into one output
  - id: mixing_speaker
    platform: mixer
    output_speaker: box_speaker
    source_speakers:
      - id: tts_speaker_mix
        timeout: 10s
        buffer_duration: 125ms
      - id: media_speaker_mix
        timeout: 10s
        buffer_duration: 125ms
  # Vritual speakers to resample each pipelines' audio, if necessary, as the mixer speaker requires the same sample rate
  - platform: resampler
    id: tts_speaker
    output_speaker: tts_speaker_mix
    sample_rate: 48000
    task_stack_in_psram: true
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_speaker_mix
    sample_rate: 48000
    task_stack_in_psram: true

media_player:
  - platform: speaker
    name: None
    id: speaker_media_player
    # media pipeline (instead of parking it half-owned) so TTS and timer
    # alarms can take the speaker graph while a stream is paused.
    pause_releases_pipeline: true
    volume_min: 0.4
    volume_max: 0.7
    volume_initial: 0.6
    buffer_size: 131072
    task_stack_in_psram: true
    media_pipeline:
      speaker: media_resampling_speaker
      sample_rate: 48000
      format: MP3
      num_channels: 1
    announcement_pipeline:
      speaker: tts_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1
    files:
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
      - id: mario_sound_main
        file: /config/esphome/sound/super_mario_opening.flac
    on_announcement:
      # Stop the wake word (mWW or VA) if the mic is capturing
      - mixer_speaker.apply_ducking:
          id: media_speaker_mix
          decibel_reduction: 20
          duration: 0.0s

    on_idle:
      # Since VA isn't running, this is the end of user-intiated media playback. Restart the wake word.
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - script.execute: draw_display
      - mixer_speaker.apply_ducking:
          id: media_speaker_mix
          decibel_reduction: 0
          duration: 1.0s

micro_wake_word:
  id: mww
  stop_after_detection: false
  models:
    - hey_jarvis
    # ── Halt word (unchanged) ─────────────────────────────────────────────
    - model: https://raw.githubusercontent.com/TaterTotterson/microWakeWords/refs/heads/main/microWakeWords/stop.json
      id: stop
      internal: true                 
      probability_cutoff: 0.40        # model default is 0.5 — your sliding avg comes in around 0.58, so 0.40 fires reliably
      sliding_window_size: 3          # model default is 5 — fires after 3 frames (~30 ms) instead of 5
  vad:
    probability_cutoff: 0.20
    sliding_window_size: 1
  on_wake_word_detected:
    - logger.log:
        tag: mww
        level: INFO   # default is DEBUG, which the global INFO level compiles out
        format: "MWW fired: %s"
        args:
          - 'wake_word.c_str()'
    - if:
        condition:
          or:
            - voice_assistant.is_running:
            - and:
                - media_player.is_announcing:
                - lambda: 'return !id(user_cancelled);'
        then:
          # A second 'Okay Nabu' / 'Zylox' doesn't just cancel — it re-opens
          # listening for a fresh turn. 'Stop' stays cancel-only.
          # ORDER MATTERS: the restart request is recorded BEFORE global_cancel
          # runs, so the cancel paints the LISTENING page (no idle flash) and
          # the dying turn's on_end takes its fast-restart path instead of the
          # full announcement-wait + cleanup sequence.
          - if:
              condition:
                lambda: 'return wake_word != "Stop";'
              then:
                - lambda: |-
                    id(pending_wake_restart) = wake_word;
                    id(pending_set_ms) = millis();
          # RE-ENTRY GUARD: while a cancel is already in flight (user_cancelled
          # is set and no new turn has reached on_listening yet), rapid repeat
          # detections — the Stop model prefiring on 'Zylox', double-fires of
          # the zylox model, or an impatient second utterance — must NOT run
          # global_cancel again: a second cancel's voice_assistant.stop can
          # kill the very turn the restart machinery just started. Updating
          # pending_wake_restart above is enough; the in-flight on_end (or the
          # direct-start below) honors the latest word.
          - if:
              condition:
                lambda: 'return !id(user_cancelled);'
              then:
                - script.execute:
                    id: barge_log
                    msg: !lambda 'return "cancel:" + wake_word;'
                - script.execute: global_cancel
              else:
                - logger.log:
                    tag: barge
                    level: INFO
                    format: "duplicate barge-in ignored (cancel in flight)"
                - script.execute:
                    id: barge_log
                    msg: "dup-ign"
          - if:
              condition:
                and:
                  - lambda: 'return !id(pending_wake_restart).empty();'
                  - not:
                      voice_assistant.is_running:
              then:
                # No pipeline was active (timer alarm, user media, stale TTS
                # tail): no on_end is coming — start the new turn directly.
                - logger.log:
                    tag: barge
                    level: INFO
                    format: "direct restart: VA idle at wake time"
                - script.execute:
                    id: barge_log
                    msg: "direct-start"
                - voice_assistant.start:
                    wake_word: !lambda return id(pending_wake_restart);
                - lambda: id(pending_wake_restart).clear();
        else:
          # Idle: only the activation word starts a new turn.
          # 'Stop' while idle is a no-op (logged above) so it cannot summon the assistant.
          - if:
              condition:
                lambda: 'return wake_word != "Stop";'
              then:
                - voice_assistant.start:
                    wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: box_mic
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 4.0
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - script.execute: draw_display
    
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: draw_display

  on_stt_end:
    - script.execute: draw_display
  on_tts_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - script.execute: draw_display

  on_end:
    # Branch tracer — INFO so it survives the production log level. The barge-in
    # machinery has had enough subtle races that every decision point logs.
    - logger.log:
        tag: barge
        level: INFO
        format: "on_end: pending='%s' announcing=%d va_running=%d"
        args:
          - id(pending_wake_restart).c_str()
          - 'id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING'
          - 'id(va).is_running()'
    - script.execute:
        id: barge_log
        msg: !lambda |-
          char b[64];
          snprintf(b, sizeof(b), "end p=%s a=%d v=%d",
                   id(pending_wake_restart).empty() ? "-" : id(pending_wake_restart).c_str(),
                   (int) (id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING),
                   (int) id(va).is_running());
          return std::string(b);
    # ── FAST BARGE-IN RESTART ────────────────────────────────────────────
    # A second 'Okay Nabu'/'Zylox' mid-turn requested a fresh turn.
    # pending_wake_restart was set BEFORE global_cancel ran, so the cancel
    # already stopped the media player, flushed+paused the speaker, cleared
    # the text sensors and painted the LISTENING page. No TTS announcement is
    # coming, and mWW never stopped (it just detected the wake word) — so the
    # normal path's 0.5 s announcement wait, drain waits, mWW restart and
    # idle-phase cleanup would only add latency and an idle flash. Skip all
    # of it and reopen the mic immediately.
    - if:
        condition:
          lambda: 'return !id(pending_wake_restart).empty();'
        then:
          # Wait until BOTH the announcement pipeline has settled AND the VA
          # component is truly back to IDLE. The VA condition is the critical
          # one: when a turn is cancelled during STREAMING_RESPONSE, core VA
          # fires on_end with state STILL = STREAMING_RESPONSE (the RUN_END
          # handler only forces IDLE from mic/awaiting states; the IDLE
          # transition happens later in VA's own loop once the announcement
          # unwinds) — and request_start is a strict NO-OP unless state ==
          # IDLE, so a start issued too early is silently swallowed (the
          # "frozen on the listening page" bug). is_running() == (state !=
          # IDLE), so waiting on it is exactly the request_start gate.
          # Do NOT gate on speaker.is_playing (lingers ~5 s after pause+flush).
          - wait_until:
              condition:
                and:
                  - not:
                      media_player.is_announcing:
                  - not:
                      voice_assistant.is_running:
              timeout: 6s
          - if:
              condition:
                and:
                  - not:
                      media_player.is_announcing:
                  - not:
                      voice_assistant.is_running:
              then:
                - logger.log:
                    tag: barge
                    level: INFO
                    format: "fast-path restart: starting new turn"
                - script.execute:
                    id: barge_log
                    msg: "fast-start"
                - voice_assistant.start:
                    wake_word: !lambda return id(pending_wake_restart);
                - lambda: id(pending_wake_restart).clear();
              else:
                # Restart impossible right now — almost always the wedged-TTS
                # case: the announcement's HTTP reader is blocked (~30 s,
                # unabortable) and holds VA hostage in STREAMING_RESPONSE.
                # ALWAYS replace the optimistic listening paint with the busy
                # indicator so the device never looks frozen-listening; the
                # media_player.on_idle handler restores idle + wake word when
                # the reader finally errors out. Only silence the speaker when
                # no turn could be live.
                - logger.log:
                    tag: barge
                    level: INFO
                    format: "fast-path restart blocked (announcing=%d va_running=%d)"
                    args:
                      - 'id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING'
                      - 'id(va).is_running()'
                - script.execute:
                    id: barge_log
                    msg: !lambda |-
                      char b[32];
                      snprintf(b, sizeof(b), "fast-blk a=%d v=%d",
                               (int) (id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING),
                               (int) id(va).is_running());
                      return std::string(b);

                - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
                - script.execute: draw_display
                - if:
                    condition:
                      not:
                        voice_assistant.is_running:
                    then:
                      - logger.log:
                          tag: va
                          level: WARN
                          format: "barge-in restart abandoned — media_player stuck in ANNOUNCING (blocked HTTP reader). Wake again once the stream errors out."
                      - lambda: |-
                          id(box_speaker).set_pause_state(true);
                          id(audio_stack).stop_speaker();
        else:
          # ── NORMAL TURN END ──────────────────────────────────────────────
          # Wait a short amount of time to see if an announcement starts
          - wait_until:
              condition:
                - media_player.is_announcing:
              timeout: 0.5s

          - if:
              condition:
                lambda: 'return id(user_cancelled);'
              then:
                - wait_until:
                    condition:
                      not:
                        media_player.is_announcing:
                    timeout: 3s
              else:
                - wait_until:
                    condition:
                      not:
                        media_player.is_announcing:
                    timeout: 5s

          - wait_until:
              condition:
                not:
                  voice_assistant.is_running:
              timeout: 6s
          # ── BARGE-IN RESTART (the main consumer for reply-phase barge-ins). ──
          - if:
              condition:
                lambda: 'return !id(pending_wake_restart).empty();'
              then:
                - if:
                    condition:
                      and:
                        - not:
                            media_player.is_announcing:
                        - not:
                            voice_assistant.is_running:
                    then:
                      - logger.log:
                          tag: barge
                          level: INFO
                          format: "late restart: starting new turn"
                      - script.execute:
                          id: barge_log
                          msg: "late-start"
                      - voice_assistant.start:
                          wake_word: !lambda return id(pending_wake_restart);
                      - lambda: id(pending_wake_restart).clear();
                    else:
                      - logger.log:
                          tag: barge
                          level: INFO
                          format: "late restart blocked (announcing=%d va_running=%d)"
                          args:
                            - 'id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING'
                            - 'id(va).is_running()'
                      - script.execute:
                          id: barge_log
                          msg: !lambda |-
                            char b[32];
                            snprintf(b, sizeof(b), "late-blk a=%d v=%d",
                                     (int) (id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING),
                                     (int) id(va).is_running());
                            return std::string(b);

                      - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
                      - script.execute: draw_display

          - if:
              condition:
                not:
                  voice_assistant.is_running:
              then:
                # If media_player is still stuck after the timeout, log a warning + keep the
                # speaker paused. The lockup itself is unavoidable — ESPHome's audio_reader has
                # a hard-coded 6 × 5 s = 30 s retry on fetch_headers and cannot be aborted from
                # outside. New turns will be accepted once the stream errors out.
                - if:
                    condition:
                      - media_player.is_announcing:
                    then:
                      - logger.log:
                          tag: va
                          level: WARN
                          format: "media_player stuck in ANNOUNCING or playing music — audio_reader is blocked on HTTP fetch_headers (~30s upstream limit). Audio is silenced; new turns will be accepted once the stream errors out."
                      #- lambda: |-
                      #    id(box_speaker).set_pause_state(true);
                      #    id(audio_stack).stop_speaker();
                      # Show a visible "busy" indicator so user knows the device is alive but waiting.
                      #- lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
                      #- script.execute: draw_display
                # Restart only mWW if enabled; streaming wake words automatically restart.
                # (Can't reuse start_wake_word here — its `not voice_assistant.is_running`
                # guard can still be false while on_end is executing.)
                - if:
                    condition:
                      - lambda: return id(wake_word_engine_location).current_option() == "On device";
                    then:
                      - lambda: id(va).set_use_wake_word(false);
                      - micro_wake_word.start:
                      # Internal models don't persist enable state — re-assert Stop and the
                      # selected activation word on every restart path, same as start_wake_word.
                      - micro_wake_word.enable_model: stop
                      - script.execute: boost_mww_priority
                - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display

  on_error:
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: draw_display
          - delay: 1s
          - if:
              condition:
                switch.is_off: mute
              then:
                - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              else:
                - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
          - script.execute: draw_display
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: draw_display
  #timer
  on_timer_started:
    - script.execute: draw_display
  on_timer_cancelled:
    - script.execute: draw_display
  on_timer_updated:
    - script.execute: draw_display
  on_timer_tick:
    - script.execute: draw_display

  on_timer_finished:
    - switch.turn_on: timer_ringing

    - component.update: matrix_display
    #original setting.
    - wait_until:
        media_player.is_announcing:
    - lambda: id(voice_assistant_phase) = ${voice_assist_timer_finished_phase_id};
    - script.execute: draw_display

script:
  - id: update_clock
    then:
      - component.update: matrix_display

  - id: play_mario_sound
    then:
      - media_player.speaker.play_on_device_media_file:
          media_file: mario_sound_main
          announcement: true

  - id: select_display_page
    then:
      - lambda: |-
          if (id(display_page).state == "Mario") {
            id(matrix_display).show_page(id(mario_page));
          } else if (id(display_page).state == "Minecraft") {
            id(matrix_display).show_page(id(minecraft_page));
          } else if (id(display_page).state == "Network") {
            id(matrix_display).show_page(id(network_page));
          }
      - component.update: matrix_display

  - id: draw_display
    then:
      - lambda: |
          // Define strip colors and pattern per voice_assistant_phase
          // Rows 30-31 (bottom 2 pixels of 32-row display)
          const int strip_y = 30;
          const int width = 64;
          const int segment = 8; // length of each colored segment in marquee
          // --- Timer takes priority over marquee ---
          id(check_if_timers_active).execute();
          id(check_if_timers).execute();
          if (id(global_is_timer_active) || id(global_is_timer)) {
            id(draw_timer_timeline).execute();
            return;  // stop here, skip the marquee
          }
          Color color1, color2;
          bool skip_marquee = false;
          switch (id(voice_assistant_phase)) {
            case ${voice_assist_listening_phase_id}:
              // Green breathing/moving strip - listening
              color1 = Color(20, 140, 30);
              color2 = Color(0, 80, 0);
              break;
            case ${voice_assist_thinking_phase_id}:
              // Yellow chasing - thinking
              color1 = Color(255, 200, 0);
              color2 = Color(80, 60, 0);
              break;
            case ${voice_assist_replying_phase_id}:
              // Cyan sweep - replying
              color1 = Color(0, 200, 255);
              color2 = Color(0, 60, 80);
              break;
            case ${voice_assist_error_phase_id}:
              // Red flash - error
              color1 = Color(255, 0, 0);
              color2 = Color(60, 0, 0);
              break;
            case ${voice_assist_muted_phase_id}:
              // Dim orange - muted
              color1 = Color(180, 40, 0);
              color2 = Color(140, 10, 0);
              break;
            case ${voice_assist_not_ready_phase_id}:
              // Purple - not ready
              color1 = Color(100, 0, 150);
              color2 = Color(30, 0, 50);
              break;
            case ${voice_assist_timer_finished_phase_id}:
              // White flash - timer done
              color1 = Color(255, 255, 255);
              color2 = Color(60, 60, 60);
              break;
            default:
              // Idle: slow Brown brick style
              skip_marquee = true;
              color1 = id(col_ground_fill);
              color2 = id(col_black);
              break;
          }
          //In mario page - Ground Row 29 always solid
          if ( id(page_no) == 1){
            
            for (int x = 0; x < width; x++) {
              id(matrix_display).draw_pixel_at(x, 29, id(col_ground_fill));
            }
            //Row 30 and 31 in either static or marquee
            if (skip_marquee) {
              // Draw brick strip only, no marquee
              const int brick_y = 30;
              const int width   = 64;
            
              for (int row = 0; row < 2; row++) {
                for (int x = 0; x < width; x++) {
                  Color c = (x % 6 == 0) ? id(col_black) : id(col_ground_fill);
                  id(matrix_display).draw_pixel_at(x, brick_y + row, c);
                }
              }
              return;
            }
          }
          
          // Minecraft page - solid dirt strip when idle
          if (id(page_no) == 2 && skip_marquee) {
            for (int x = 0; x < width; x++) {
              id(matrix_display).draw_pixel_at(x, strip_y,     id(mc_dirt_dark));
              id(matrix_display).draw_pixel_at(x, strip_y + 1, id(mc_dirt_dark));
            }
            return;
          }

          int offset = id(marquee_offset);
          for (int x = 0; x < width; x++) {
            // Create alternating segments that scroll with offset
            int pos = (x + offset) % (segment * 2);
            Color c = (pos < segment) ? color1 : color2;
            id(matrix_display).draw_pixel_at(x, strip_y,     c);
            id(matrix_display).draw_pixel_at(x, strip_y + 1, c);
          }

  - id: fetch_first_active_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_active_timer) = output_timer;
  - id: check_if_timers_active
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
            }
          }
          id(global_is_timer_active) = output;
  - id: fetch_first_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_timer) = output_timer;
  - id: check_if_timers
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
            }
          }
          id(global_is_timer) = output;    

  - id: draw_timer_timeline
    then:
      - lambda: |
          id(check_if_timers_active).execute();
          id(check_if_timers).execute();
          if (id(global_is_timer_active)) {
            id(fetch_first_active_timer).execute();
            int active_pixels = round( 64.0 * id(global_first_active_timer).seconds_left / max(id(global_first_active_timer).total_seconds, static_cast<uint32_t>(1)) );
            // Clear the row first
            for (int x = 0; x < 64; x++) {
              id(matrix_display).draw_pixel_at(x, 31, Color::BLACK);
            }
            // Draw progress in active color
            for (int x = 0; x < active_pixels; x++) {
              id(matrix_display).draw_pixel_at(x, 31, id(active_timer_color));
            }
          } else if (id(global_is_timer)) {
            id(fetch_first_timer).execute();
            int active_pixels = round( 64.0 * id(global_first_timer).seconds_left / max(id(global_first_timer).total_seconds, static_cast<uint32_t>(1)) );
            // Clear the row first
            for (int x = 0; x < 64; x++) {
              id(matrix_display).draw_pixel_at(x, 31, Color::BLACK);
            }
            // Draw progress in paused color
            for (int x = 0; x < active_pixels; x++) {
              id(matrix_display).draw_pixel_at(x, 31, id(paused_timer_color));
            }
          }

  # Starts either mWW or the streaming wake word, depending on the configured location
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
  # Stops either mWW or the streaming wake word, depending on the configured location
  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - micro_wake_word.stop:
  # Set the voice assistant phase to idle or muted, depending on if the software mute switch is activated
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
  - id: enter_privacy_mode
    then:
      - if:
          condition:
            lambda: 'return !id(privacy_mode);'
          then:
            - lambda: |-
                id(privacy_mode) = true;
                id(speaker_was_playing) = id(study_room_speaker_state).state == "playing";
            - homeassistant.service:
                service: media_player.volume_mute
                data:
                  entity_id: ${speaker_in_ma}
                  is_volume_muted: "true"

            - if:
                condition:
                  lambda: |-
                    return id(speaker_was_playing);
                then:
                  - homeassistant.service:
                      service: media_player.media_pause
                      data:
                        entity_id: ${speaker_in_ma}

            - lambda: |-
                auto call = id(matrix_backlight).turn_off();
                call.perform();

  - id: exit_privacy_mode
    then:
      - if:
          condition:
            lambda: 'return id(privacy_mode);'
          then:
            - lambda: |-
                id(privacy_mode) = false;

            - homeassistant.service:
                service: media_player.volume_mute
                data:
                  entity_id: ${speaker_in_ma}
                  is_volume_muted: "false"

            - if:
                condition:
                  lambda: 'return id(speaker_was_playing);'
                then:
                  - homeassistant.service:
                      service: media_player.media_play
                      data:
                        entity_id: ${speaker_in_ma}

                  - lambda: |-
                      id(speaker_was_playing) = false;

            - lambda: |-
                auto call = id(matrix_backlight).turn_on();
                call.perform();
  
  - id: speaker_volume_up
    mode: restart
    then:
      - lambda: |-
          id(speaker_volume_target) += 0.03;
          if (id(speaker_volume_target) > 1.0) {
            id(speaker_volume_target) = 1.0;
          }

          auto call = id(speaker_media_player).make_call();
          call.set_volume(id(speaker_volume_target));
          call.perform();

  - id: speaker_volume_down
    mode: restart
    then:
      - lambda: |-
          id(speaker_volume_target) -= 0.03;
          if (id(speaker_volume_target) < 0.0) {
            id(speaker_volume_target) = 0.0;
          }

          auto call = id(speaker_media_player).make_call();
          call.set_volume(id(speaker_volume_target));
          call.perform();
  - id: apply_speaker_gain
    mode: queued
    max_runs: 2
    then:
      - lambda: |-
          float db = id(speaker_gain).state;
          if (isnan(db)) db = 6.0f;
          db = std::max(0.0f, std::min(12.0f, db));
          const int delta = (int) lroundf(db * 2.0f);
          uint8_t reg = 0;
          if (!id(es8311_raw).read_byte(0x32, &reg)) return;
          int base;
          if (id(gain_last_written) >= 0 && reg == (uint8_t) id(gain_last_written)) {
            base = id(gain_base);   // untouched since our last write
          } else {
            base = reg;             // codec rewrote the register: new base
          }
          int target = base + delta;
          if (target > 255) target = 255;
          if ((uint8_t) target != reg) {
            id(es8311_raw).write_byte(0x32, (uint8_t) target);
          }
          id(gain_base) = base;
          id(gain_last_written) = target;
  # On-device forensic trail for the barge-in machinery
  - id: barge_log
    parameters:
      msg: string
    then:
      - lambda: |-
          std::string s = id(barge_trail).has_state() ? id(barge_trail).state : "";
          if (s.length() > 170) s = s.substr(s.length() - 170);
          if (!s.empty()) s += " | ";
          s += msg;
          id(barge_trail).publish_state(s);

  - id: boost_mww_priority
    mode: restart
    then:
      - delay: 1s
      - lambda: |-
          TaskHandle_t mww_task = xTaskGetHandle("mww");
          if (mww_task) {
            vTaskPrioritySet(mww_task, 8);
          }

  - id: global_cancel
    then:
      - lambda: id(user_cancelled) = true;
      - voice_assistant.stop:
      - media_player.stop:
          announcement: true
      - media_player.stop: speaker_media_player
      # ── Halt the audio-stack speaker output immediately ──────────────────
      # Calling `speaker.stop` is futile while media_player still has data:

      # The pause is cleared in voice_assistant.on_listening when a fresh
      # turn starts, so the wake-chime + new TTS play normally.
      - lambda: |-
          id(box_speaker).set_pause_state(true);
          id(audio_stack).stop_speaker();
      - switch.turn_off: timer_ringing

      # When a barge-in restart is pending (second activation word), go straight
      # to the LISTENING visuals — the restart lands a few hundred ms later and
      # the screen should never flash the idle page between the two turns.
      # Cancel-only paths (Stop, touch) keep the idle/mute page as before.
      - if:
          condition:
            lambda: 'return id(pending_wake_restart).empty();'
          then:
            - script.execute: set_idle_or_mute_phase
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
      - script.execute: draw_display
switch:
  - platform: template
    name: Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - microphone.unmute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: draw_display
    on_turn_on:
      - microphone.mute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
      - script.execute: draw_display

  - platform: output
    id: speaker_switch
    name: "Speaker Enable"
    output: pa_ctrl
    restore_mode: ALWAYS_ON

  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      # Turn off the repeat mode and disable the pause between playlist items
      - lambda: |-
              id(speaker_media_player)
                ->make_call()
                .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
                .set_announcement(true)
                .perform();
              id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      # Stop playing the alarm
      - media_player.stop:
          announcement: true
    on_turn_on:
      # Turn on the repeat mode and pause for 1000 ms between playlist items/repeats
      - lambda: |-
            id(speaker_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
              .set_announcement(true)
              .perform();
            id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      #make sure volume is not too small for alarm.
      - speaker.volume_set:
          id: box_speaker
          volume: 60%

      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_sound
          announcement: true
      ##play for 30s.
      - delay: 30s
      - switch.turn_off: timer_ringing

  - platform: template
    id: local_media_mute
    icon: 'mdi:volume-off'
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_on:
      then:
        - homeassistant.action:
            action: media_player.volume_set
            data:
              entity_id: media_player.speaker_media_player
              volume_level: "0"
    on_turn_off:
      - homeassistant.action:
          action: media_player.volume_set
          data:
            entity_id: media_player.speaker_media_player
            volume_level: !lambda 'return id(local_volume_value);'
  # Runtime AEC on/off (packages/esp_audio_stack/aec_controls.yaml). Restores
  # ON — leave it on for normal use, barge-in ('Stop' during TTS) depends on it.
  - platform: esp_audio_stack
    esp_audio_stack_id: audio_stack
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: RESTORE_DEFAULT_ON

# Light entity exposed to Home Assistant
light:
  - platform: monochromatic
    name: "Matrix Display Backlight"
    id: matrix_backlight
    output: matrix_brightness_output
    default_transition_length: 0s
    restore_mode: RESTORE_DEFAULT_ON

display:
  - platform: hub75
    id: matrix_display
    clock_speed: 16MHZ
    board: adafruit-matrix-portal-s3
    shift_driver: ICN2038S
    double_buffer: True  #This stops the whole screen flicking when animation.
    panel_width: 64
    panel_height: 32
    brightness: ${day_brightness}
    bit_depth: 5
    #update_interval: never
    update_interval: 33ms
    scan_wiring: STANDARD_TWO_SCAN
    #Pins color.
    r1_pin: GPIO4
    g1_pin: GPIO6
    b1_pin: GPIO5
    r2_pin: GPIO7
    g2_pin: GPIO16
    b2_pin: GPIO15
    a_pin: GPIO18
    b_pin: GPIO8
    c_pin: GPIO3
    d_pin: GPIO42
    e_pin: GPIO9
    clk_pin: GPIO41
    oe_pin: GPIO2
    lat_pin: GPIO40
    pages:
      - id: mario_page
        lambda: |-
          // Sky color
            bool day = id(sunstate).is_above_horizon();

            if (day) {
              it.fill(id(col_sky));  // daytime sky
            } else {
              it.fill(id(col_black));  // black night sky
            }
            auto now = id(sntp_time).now();
            if (!now.is_valid()) {
              it.print(4, 10, id(TickingTimebomb), "Syncing ...");
              return;
            }
            // ===== BUSH1 =====
            it.filled_circle(19, 29, 3, id(col_bush));
            it.filled_circle(23, 26, 3, id(col_bush));
            it.filled_circle(25, 29, 3, id(col_bush));
            it.filled_circle(27, 29, 3, id(col_bush));
            
            // ================= PIPE (8x7)
            int pix = id(pipe_x);
            int piy = id(pipe_y);
            // Top-left corner of pipe:
            int x0 = pix - 5;
            int y0 = piy - 11;
            // ----- PIPE Row 1 -----
            for (int x = 0; x < 8; x++)
              it.draw_pixel_at(x0+x, y0+1, id(col_black));
            
            // ----- PIPE Row 2 -----
            it.draw_pixel_at(x0+0, y0+2, id(col_black));
            it.draw_pixel_at(x0+1, y0+2, id(col_green));
            it.draw_pixel_at(x0+2, y0+2, id(col_green));
            it.draw_pixel_at(x0+3, y0+2, id(col_green));
            it.draw_pixel_at(x0+4, y0+2, id(col_green));
            it.draw_pixel_at(x0+5, y0+2, id(col_green));
            it.draw_pixel_at(x0+6, y0+2, id(col_green));
            it.draw_pixel_at(x0+7, y0+2, id(col_black));
            
            // ----- Row 4 -----
            it.draw_pixel_at(x0+0, y0+3, id(col_black));
            it.draw_pixel_at(x0+1, y0+3, id(col_green));
            it.draw_pixel_at(x0+2, y0+3, id(col_green));
            it.draw_pixel_at(x0+3, y0+3, id(col_green));
            it.draw_pixel_at(x0+4, y0+3, id(col_green));
            it.draw_pixel_at(x0+5, y0+3, id(col_green));
            it.draw_pixel_at(x0+6, y0+3, id(col_green));
            it.draw_pixel_at(x0+7, y0+3, id(col_black));
            
            // ----- Row 5 -----
            for (int x = 0; x < 8; x++) {
              it.draw_pixel_at(x0+x, y0+4, id(col_black));
            }
            
            // ----- Rows 6–9 (pipe stem) -----
            for (int y = 5; y <= 8; y++) {
              it.draw_pixel_at(x0+1, y0+y, id(col_black));
              it.draw_pixel_at(x0+2, y0+y, id(col_green));
              it.draw_pixel_at(x0+3, y0+y, id(col_green));
              it.draw_pixel_at(x0+4, y0+y, id(col_green));
              it.draw_pixel_at(x0+5, y0+y, id(col_green));
              it.draw_pixel_at(x0+6, y0+y, id(col_black));
            }

            // ===== QUESTION BLOCK =====
            int block_base_y = id(mario_base_y) - 14 - 9 - 1;
            //bump up by 2 pixel
            int block_bump = (id(mario_anim_state) == 2) ? -2 : 0;
            int block_x0 = 2;
            int block_y0 = block_base_y + block_bump;
            // Gold background
            for (int dx = 0; dx < 9; dx++)
              for (int dy = 0; dy < 9; dy++)
                it.draw_pixel_at(block_x0+dx, block_y0+dy, id(col_gold));
            // top border
            for (int i = 0; i < 9; i++)
              it.draw_pixel_at(block_x0+i, block_y0+0, id(col_brown));
            // bottom border
            for (int i = 0; i < 9; i++)
              it.draw_pixel_at(block_x0+i, block_y0+8, id(col_black));
            // left border
            for (int i = 1; i < 8; i++)
              it.draw_pixel_at(block_x0+0, block_y0+i, id(col_brown));
            // right border
            for (int i = 1; i < 8; i++)
              it.draw_pixel_at(block_x0+8, block_y0+i, id(col_black));
            if (id(mario_anim_state) == 0 || id(mario_anim_state) == 1) {
              // ? mark in brown
              it.draw_pixel_at(block_x0+3, block_y0+2, id(col_brown));
              it.draw_pixel_at(block_x0+4, block_y0+2, id(col_brown));
              it.draw_pixel_at(block_x0+5, block_y0+2, id(col_brown));
              it.draw_pixel_at(block_x0+5, block_y0+3, id(col_brown));
              it.draw_pixel_at(block_x0+4, block_y0+4, id(col_brown));
              it.draw_pixel_at(block_x0+4, block_y0+5, id(col_brown));
              it.draw_pixel_at(block_x0+4, block_y0+7, id(col_brown));
            }
            // ===== COIN =====
            const char COIN[7][6] = {
              " GGG ",
              "GWGGG",
              "GWGYG",
              "GWGYG",
              "GWGYG",
              "GWGGG",
              " GGG "
            };
            // ---- draw coin helper (5x9) ----
            auto draw_coin = [&](int COIN_X, int COIN_Y) {
              for (int y = 0; y < 7; y++) {
                for (int x = 0; x < 5; x++) {

                  Color c;
                  bool draw = true;

                  switch (COIN[y][x]) {
                    case 'G': c = id(col_gold);   break;
                    case 'W': c = id(col_white);  break;
                    case 'Y': c = id(col_orange); break;
                    default:  draw = false;
                  }

                  if (draw) {
                    it.draw_pixel_at(
                      COIN_X + x,
                      COIN_Y + y,
                      c
                    );
                  }
                }
              }
            };

            //Draw two coins
            //draw_coin(50, 21);
            draw_coin(57, 13);

            // ===== CLOUD1 =====
            const int cloud1_offsets[4] = { -3, -1, 1, 3 };
            if (day) {
              int x_cloud1 = 26;
              int y_cloud1 = 2;
              it.filled_circle(x_cloud1 - 2, y_cloud1,     2, id(col_white));
              it.filled_circle(x_cloud1,     y_cloud1 - 1, 2, id(col_white));
              it.filled_circle(x_cloud1 + 2, y_cloud1,     2, id(col_white));
              it.filled_rectangle(x_cloud1 - 3, y_cloud1 + 1, 6, 2, id(col_white));
            }

            
            // --- Right: Weather icon with animation---

            std::string weather_stat = id(ha_weather_state).state;
            std::string ws;
            if (!weather_stat.empty() || weather_stat != "unknown" || weather_stat != "unavailable") {
                ws = weather_stat;
                std::transform(ws.begin(), ws.end(), ws.begin(), ::tolower);
            } else {
                ws = "";
            }

            const char* icon = "\U000F0590";
            Color icon_color = id(col_white);
            bool is_rain = false;

            if (weather_stat == "sunny") {
                icon = "\U000F05A8";
                icon_color = id(col_yellow);

            } else if (ws.find("rain") != std::string::npos) {
                icon = "\U000F0590";   // cloudy icon for rain
                icon_color = id(col_white);
                is_rain = true;

            } else if (weather_stat == "lightning" || weather_stat == "lightning-rainy") {
                icon = "\U000F0593";
                icon_color = id(col_white);

            } else if (weather_stat == "windy" || weather_stat == "windy-variant") {
                icon = "\U000F059D";
                icon_color = id(col_white);

            } else if (weather_stat == "clear-night" || weather_stat == "clearnight") {
                icon = "\U000F0594";
                icon_color = id(col_white);

            } else if (ws.find("cloud") != std::string::npos) {
                icon = "\U000F0590";
                icon_color = id(col_white);
            }

            // Draw icon
            it.printf(
                59, 3,
                id(icon_font_9),
                icon_color,
                TextAlign::CENTER,
                "%s",
                icon
            );

            // 3 Rain drop animation overlay
            auto draw_rain = [&](int drop_x1, int drop_start_y) {
                int drop_x2 = drop_x1 + 2;
                int drop_x3 = drop_x1 + 4;

                uint32_t fall_dur    = 500;
                uint32_t stagger     = fall_dur * 6 / 10;
                uint32_t period      = stagger * 3;
                uint32_t visible     = fall_dur * 4 / 5;
                uint32_t drop_travel = 4;

                uint32_t t = millis() % period;

                auto draw_drop = [&](int x, uint32_t phase_offset) {
                    uint32_t lt = (t + period - phase_offset) % period;
                    if (lt < fall_dur) {
                        int offset = (int)(lt * drop_travel) / (int)fall_dur;
                        if (lt < visible) {
                            it.draw_pixel_at(x, drop_start_y + offset,     id(col_white));
                            it.draw_pixel_at(x, drop_start_y + offset + 1, id(col_white));
                        }
                    }
                };

                draw_drop(drop_x1, 0);
                draw_drop(drop_x2, stagger);
                draw_drop(drop_x3, stagger * 2);
            };
            
            if (is_rain){
              draw_rain(57, 6);
            }
              
            // temperature
            if (id(study_temp).has_state()) {
              it.printf(55, 25, id(font_small), TextAlign::CENTER, "%.0f°C", id(study_temp).state);
            } else {
              it.print(55, 25, id(font_small), TextAlign::CENTER, "...");
            }

            // ==== stars twinkle at night===
            if (!day) {
              int sx1 = 14;
              int sy1 = 3;
              int sx2 = 44;
              int sy2 = 2;

              // --- base stars (dim) ---
              auto draw_star_small = [&](int x, int y, Color c) {
                it.draw_pixel_at(x, y, c);
              };

              draw_star_small(sx1, sy1, id(col_white));
              draw_star_small(sx2, sy2, id(col_white));

              // --- twinkling star (bright, plus-shaped) ---
              int x, y;
              if (id(twinkle_index) == 0)      { x = sx1; y = sy1; }
              else { x = sx2; y = sy2; }

              it.draw_pixel_at(x,     y,     id(col_white));
              it.draw_pixel_at(x - 1, y,     id(col_white));
              it.draw_pixel_at(x + 1, y,     id(col_white));
              it.draw_pixel_at(x,     y - 1, id(col_white));
              it.draw_pixel_at(x,     y + 1, id(col_white));
            }
            //=== Clock Panel
            int box_x = 16;
            int box_y = 5;
            int box_w = 39;
            int box_h = 16;
            it.filled_rectangle(box_x, box_y, box_w, box_h, id(col_white));
            it.rectangle(box_x, box_y, box_w, box_h, id(col_panel_border));
            it.draw_pixel_at(box_x,           box_y,           id(col_black));
            it.draw_pixel_at(box_x+box_w-1,   box_y,           id(col_black));
            it.draw_pixel_at(box_x,           box_y+box_h-1,   id(col_black));
            it.draw_pixel_at(box_x+box_w-1,   box_y+box_h-1,   id(col_black));    
            // ===== TIME =====
            char time_str[8];
            sprintf(time_str, "%02d:%02d", now.hour, now.minute);    
            int x1, y1, w, h;
            it.get_text_bounds(0, 0, time_str, id(TickingTimebomb), TextAlign::TOP_LEFT, &x1, &y1, &w, &h);
                
            int tx = box_x + (box_w - w) / 2;
            int ty = box_y - 1 + (box_h - h) / 2 ;
            
            // ===== CLOCK CLEAR AREA
            it.filled_rectangle(box_x+1, box_y+1, box_w-2, box_h-2, id(col_white));
                
            it.print(tx, ty, id(TickingTimebomb), id(col_black), time_str);

            // ===== MARIO =====
            int px = id(mario_x);
            int py = id(mario_y);    
            // ----- Hat -----
            // Row 0 – Hat1 top
            it.draw_pixel_at(px-2, py-14, id(col_red));
            it.draw_pixel_at(px-1, py-14, id(col_red));
