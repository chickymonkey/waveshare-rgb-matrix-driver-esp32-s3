esphome:
  name: matrix-clock
  friendly_name: Matrix Clock
  min_version: 2026.5.0  # esphome-intercom 2026.6.x requires ESPHome 2026.5.x or newer
  on_boot:
    - priority: -100
      then:
        - script.execute: select_display_page
        - component.update: matrix_display
        - lambda: |-
            if (id(matrix_backlight).current_values.is_on()) {
              if (id(matrix_backlight).current_values.is_on()) {
                int brightness = id(sunstate).is_above_horizon() 
                  ? ${day_brightness} 
                  : ${night_brightness};
                id(matrix_display).set_brightness(brightness);
              }
            }
              
        - lambda: |- # gyroscope
            ESP_LOGI("QMI8658", "Initializing...");

            // WHO_AM_I check
            uint8_t whoami_reg = 0x00;
            uint8_t whoami = 0;
            if (id(i2c_adc_dac)->write_readv(0x6B, &whoami_reg, 1, &whoami, 1) == i2c::ERROR_OK) {
              ESP_LOGI("QMI8658", "WHO_AM_I = 0x%02X (expect 0x05)", whoami);
            } else {
              ESP_LOGE("QMI8658", "WHO_AM_I read failed - check wiring/address");
            }

            // CTRL1: interface config (auto-increment, INT active-high push-pull)
            uint8_t ctrl1[] = {0x02, 0x60};
            id(i2c_adc_dac)->write(0x6B, ctrl1, 2);

            // CTRL2: accel ±2g, 125Hz ODR
            uint8_t ctrl2[] = {0x03, 0x04};
            id(i2c_adc_dac)->write(0x6B, ctrl2, 2);

            // CTRL3: gyro ±512dps, 125Hz ODR  
            uint8_t ctrl3[] = {0x04, 0x54};
            id(i2c_adc_dac)->write(0x6B, ctrl3, 2);

            // CTRL7: enable accel + gyro
            uint8_t ctrl7[] = {0x08, 0x03};
            id(i2c_adc_dac)->write(0x6B, ctrl7, 2);

            ESP_LOGI("QMI8658", "Init complete");
        
        # Speaker Gain on top of the codec's freshly-initialized DAC volume.
        - script.execute: apply_speaker_gain
    - priority: 600
      then:
        - delay: 10s
        - script.execute: play_mario_sound

esp32:
  board: esp32-s3-devkitc-1-n32r8v
  flash_size: 32MB
  partitions: partitions32mb.csv
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_SPIRAM: "y"
      CONFIG_ESP32S3_SPIRAM_SUPPORT: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "65536"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Route ordinary large mallocs (GMF / esp-sr / esp_audio_effects) to PSRAM
      # keeping internal RAM for DMA/Wi-Fi/latency-critical use.
      CONFIG_SPIRAM_USE_CAPS_ALLOC: "n"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "4096"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      CONFIG_MDNS_TASK_CREATE_FROM_SPIRAM: "y"
      CONFIG_MDNS_MEMORY_ALLOC_SPIRAM: "y"
    #experimental
    advanced:
      enable_idf_experimental_features: true
      execute_from_psram: true
      compiler_optimization: "PERF"
