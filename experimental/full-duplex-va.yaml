      - id: minecraft_page
        lambda: |-
          const int W = 64;
          const int H = 32;
          const int BORDER = 3;
          const int GRASS_H = 2;
          it.fill(Color(0, 0, 0));

          // ===== DIRT BORDER =====
          for (int x = 0; x < W; x++) {
              for (int y = 0; y < H; y++) {
                  bool border =
                      x < BORDER || x >= W - BORDER ||
                      y < BORDER || y >= H - BORDER;

                  if (border) {
                      Color c = id(mc_dirt);
                      int n = (x * 11 + y * 7) % 10;
                      if (n < 3)      c = id(mc_dirt_dark);
                      else if (n > 7) c = id(mc_dirt_light);
                      it.draw_pixel_at(x, y, c);
                  }
              }
          }
          //draw some broken walls
          it.draw_pixel_at(61, 26, id(col_white));
          it.draw_pixel_at(61, 27, id(col_white));
          it.draw_pixel_at(62, 19, id(col_white));
          it.draw_pixel_at(62, 20, id(col_white));
          it.draw_pixel_at(62, 21, id(col_white));
          it.draw_pixel_at(62, 22, id(col_white));
          it.draw_pixel_at(62, 23, id(col_white));
          it.draw_pixel_at(62, 24, id(col_white));
          it.draw_pixel_at(62, 25, id(col_white));
          
          it.draw_pixel_at(63, 20, id(col_white));
          it.draw_pixel_at(63, 21, id(col_white));
          it.draw_pixel_at(63, 22, id(col_white));
          it.draw_pixel_at(63, 23, id(col_white));
          it.draw_pixel_at(63, 24, id(col_white));
          it.draw_pixel_at(63, 25, id(col_white));
          it.draw_pixel_at(63, 26, id(col_white));
          it.draw_pixel_at(63, 27, id(col_white));
          
          it.draw_pixel_at(61, 20, id(col_white));
          it.draw_pixel_at(61, 21, id(col_white));
          it.draw_pixel_at(61, 22, id(col_white));
          it.draw_pixel_at(61, 23, id(col_white));
          it.draw_pixel_at(61, 24, id(col_white));
          it.draw_pixel_at(61, 25, id(col_white));
          it.draw_pixel_at(61, 26, id(col_white));
          it.draw_pixel_at(61, 27, id(col_white));
          it.draw_pixel_at(60, 27, id(mc_dirt_dark));
          // ===== GRASS STRIP =====
          for (int x = BORDER; x < W - BORDER; x++) {
              for (int y = BORDER; y < BORDER + GRASS_H; y++) {
                  Color g = ((x + y) % 3 == 0)
                            ? id(mc_grass_dark)
                            : id(mc_grass);
                  it.draw_pixel_at(x, y, g);
              }
          }

          // ===== INNER Black PANEL =====
          it.filled_rectangle(
              BORDER + 1,
              BORDER + GRASS_H + 1,
              W - (BORDER * 2) - 2,
              H - (BORDER * 2) - GRASS_H - 2,
              id(col_white)
          );
            //=== Clock Panel
            int box_x = 16;
            int box_y = 6;
            int box_w = 34;
            int box_h = 14;
            it.filled_rectangle(box_x, box_y - 2, box_w, box_h, id(col_black));

          //  ===== MINECRAFT clock =====
            char time_str[8];
            auto now = id(sntp_time).now();
            sprintf(time_str, "%02d:%02d", now.hour, now.minute);    
            int x1, y1, w, h;
            it.get_text_bounds(0, 0, time_str, id(TickingTimebomb), TextAlign::TOP_LEFT, &x1, &y1, &w, &h);
            int tx = box_x -1 + (box_w - w) / 2;
            int ty = box_y + (box_h - h) / 2 ;
            //it.filled_rectangle(box_x+1, box_y+1, box_w-2, box_h-2, id(col_black));
                
            it.print(tx, ty-3, id(TickingTimebomb), id(col_gold), time_str);

          // ===== DATE BELOW time =====
          const char *months[] = {
            "${jan}", "${feb}", "${mar}", "${apr}", "${may}",
            "${jun}", "${jul}", "${aug}", "${sept}",
            "${oct}", "${nov}", "${dec}"
          };

          it.printf(
            box_x + box_w / 2,
            23,
            id(font_date),
            id(col_black),
            TextAlign::CENTER,
            "%d %s",
            now.day_of_month,
            months[now.month - 1]
          );

          // ===== MINECRAFT STEVE =====
            const int STEVE_X = BORDER - 5;
            const int STEVE_Y = BORDER + GRASS_H + 2;
            
            // S = skin, H = hair, B = shirt, P = pants, W = sword, E = eye
            const char STEVE[21][21] = {
              "        BBBBBBBB    ",
              "    C   BHHHHHHB    ",
              "   CWC  BHHHHHHB    ",
              "   CWC  BHSSSSHB    ",
              "   CWC  BSESSESB    ",
              "   CWC  BSSSSSSB    ",
              "   CWC  BSSHHSSB    ",
              "   CWC  BBBBBBBB    ",
              "   CWC BCBCCCCBCB   ",
              " CCCCCCBCBCCCCBCB   ",  
              "   BBBBSBBCCCCBBSB  ",
              "   BSSSSBBCCCCBBSB  ",
              "   BBBBB BCCCCB BSB ",
              "    D    BBBBBB BSB ",
              "    C    BPPPPB  BB ",
              "         BPBBPB     ",
              "         BPBBPB     ",
              "         BPBBPB     ",
              "         BPBBPB     ",
              "         BPBBPB     ",
              "         BDBBDB     "
            };
            
            for (int y = 0; y < 21; y++) {
              for (int x = 0; x < 20; x++) {
                Color c;
                bool draw = true;
            
                switch (STEVE[y][x]) {
                  case 'H': c = id(steve_hair); break;
                  case 'S': c = id(steve_skin); break;
                  case 'E': c = id(steve_eye); break;
                  case 'C': c = id(steve_shirt); break;
                  case 'P': c = id(steve_pants); break;
                  case 'W': c = id(col_white); break;
                  case 'D': c = id(steve_sword_dark); break;
                  case 'B': c = id(col_black); break;
                  default: draw = false;
                }
            
                if (draw) {
                  it.draw_pixel_at(
                    STEVE_X + x,
                    STEVE_Y + y,
                    c
                  );
                }
              }
            }
            
          // --- Middle: Weather icon ---
            std::string weather_stat = id(ha_weather_state).state;

            const char* icon = "\U000F0590";
            Color icon_color = id(col_white);
            bool is_rain = false;

            if (weather_stat == "sunny") {
                icon = "\U000F05A8";
                icon_color = id(col_gold);

            } else if (weather_stat.find("rain") != std::string::npos) {
                icon = "\U000F0590";   // cloudy icon for rain
                icon_color = id(col_white);
                is_rain = true;
            } else if (weather_stat == "lightning" || weather_stat == "lightning-rainy") {
                icon = "\U000F0593";
                icon_color = id(col_white);

            } else if (weather_stat == "windy" || weather_stat == "windy-variant") {
                icon = "\U000F059D";
                icon_color = id(col_white);

            } else if (weather_stat == "clear-night" || weather_stat == "clearnight") {
                icon = "\U000F0594";
                icon_color = id(col_white);

            } else if (weather_stat == "cloudy" || weather_stat == "partlycloudy") {
                icon = "\U000F0590";
                icon_color = id(col_white);
            }
            const int weather_X = BORDER + 30;
            // draw icon WITH color
            it.printf(
                weather_X, 1,
                id(icon_font_9),
                icon_color,
                TextAlign::CENTER,
                "%s",
                icon
            );
            // 3 Rain drop animation overlay
            
            auto draw_rain = [&](int drop_x1, int drop_start_y) {
                int drop_x2 = drop_x1 + 2;
                int drop_x3 = drop_x1 + 4;

                uint32_t fall_dur    = 500;
                uint32_t stagger     = fall_dur * 6 / 10;
                uint32_t period      = stagger * 3;
                uint32_t visible     = fall_dur * 4 / 5;
                uint32_t drop_travel = 4;

                uint32_t t = millis() % period;

                auto draw_drop = [&](int x, uint32_t phase_offset) {
                    uint32_t lt = (t + period - phase_offset) % period;
                    if (lt < fall_dur) {
                        int offset = (int)(lt * drop_travel) / (int)fall_dur;
                        if (lt < visible) {
                            it.draw_pixel_at(x, drop_start_y + offset,     id(col_white));
                            it.draw_pixel_at(x, drop_start_y + offset + 1, id(col_white));
                        }
                    }
                };

                draw_drop(drop_x1, 0);
                draw_drop(drop_x2, stagger);
                draw_drop(drop_x3, stagger * 2);
            };
            // Draw rain drops
            if (is_rain){
              draw_rain(31, 4);
            }
          // ===== MINECRAFT Zombie (Animated – stepped) =====
            const int ZOMBIE_BASE_X = BORDER + 50;
            const int ZOMBIE_Y      = BORDER + GRASS_H + 13;

            const char ZOMBIE[10][9] = {
              "   LLGG ",
              "   BLBL ",
              "   LWGG ",
              "GGCCGLLC",
              "GGCCCGGC",
              "   CCCC ",
              "   EECC ",
              "   EEEE ",
              "   EEEE ",
              "   DDDD "
            };

            int ZOMBIE_X = ZOMBIE_BASE_X + id(zombie_offset);
            bool facing_left = (id(zombie_dir) < 0);

            // ---- clear zombie movement area ----
            it.filled_rectangle(
              ZOMBIE_BASE_X - 4,
              ZOMBIE_Y,
              12,
              10,
              id(col_white)
            );

            // ---- draw zombie ----
            for (int y = 0; y < 10; y++) {
              for (int x = 0; x < 8; x++) {
                int sx = facing_left ? x : (7 - x);
                Color c;
                bool draw = true;
                switch (ZOMBIE[y][sx]) {
                  case 'E': c = id(steve_eye);        break;
                  case 'C': c = id(steve_shirt);      break;
                  case 'D': c = id(steve_sword_dark); break;
                  case 'B': c = id(col_black);        break;
                  case 'L': c = id(col_lime);         break;
                  case 'G': c = id(col_green);        break;
                  default:  draw = false;
                }
                if (draw) {
                  it.draw_pixel_at(ZOMBIE_X + x, ZOMBIE_Y + y, c);
                }
              }
            }
          id(draw_display).execute();

