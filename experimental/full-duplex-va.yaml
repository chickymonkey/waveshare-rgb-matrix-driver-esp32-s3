## ref: https://github.com/esphome/esphome/blob/dev/esphome/components/hub75/display.py
## https://api-docs.esphome.io/classesphome_1_1hub75_1_1_h_u_b75_display
## changed waveshare: https://docs.waveshare.net/ESP32-S3-RGB-Matrix/
# Empirical TDM mapping on this board:
#   - slot 2 = left microphone  (left of the GPIO connector)
#   - slot 0 = right microphone (right of the GPIO connector)
#   - slot 1 = playback reference used by AEC
#   - slot 3 = near-silent / unused on this board revision
#
# Dual-mic target:
#   ES7210 TDM slots [0, 2]          → esp_ae_rate_cvt x3 ──┐
#   ES7210 TDM slot 1 (DAC ref)      → esp_ae_rate_cvt x3 ──┴── esp_afe (AEC + Speech Enhancement + VAD) → mono mic_main → VA / MWW
#
#   Music/radio → media_speaker (resampler) ───────────┐
#                                                      ┼── mixer (48kHz) → hw_speaker → ES8311 DAC
#   VA TTS      → tts_speaker (resampler) ─────────────┘
#
# =============================================================================

