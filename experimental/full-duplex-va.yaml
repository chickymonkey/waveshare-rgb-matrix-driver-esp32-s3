              //  call.set_value(15);
              //  call.perform();
              //} else if (day) {
              //  id(matrix_display).set_brightness(35);
              //  auto call = id(led_brightness).make_call();
              //  call.set_value(35);
              //  call.perform();
              //}
              if (id(matrix_backlight).current_values.is_on()) {
